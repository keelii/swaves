name: Release Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (semver, e.g. v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  validate_release_tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        shell: bash
        run: |
          set -euo pipefail

          semver_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "tag is required for release workflow"
            exit 1
          fi

          if [[ ! "${tag}" =~ ${semver_regex} ]]; then
            echo "invalid tag: ${tag}"
            echo "expected semver like: v1.2.3, v1.2.3-rc.1, or v1.2.3+build.5"
            exit 1
          fi

          echo "validated tag: ${tag}"

  test:
    name: Run Tests
    needs: validate_release_tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run make test
        run: make test

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          # - os: darwin
          #   arch: arm64
          #   runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            version="${{ github.event.inputs.tag }}"
          else
            version="manual-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build release package via Makefile
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          make release \
            VERSION="${{ steps.meta.outputs.version }}" \
            COMMIT="${GITHUB_SHA::7}" \
            BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swaves_${{ steps.meta.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}
          path: |
            swaves_*.tar.gz
            swaves_*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve tag and release name
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="manual-${GITHUB_SHA::7}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
