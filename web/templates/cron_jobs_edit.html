
<form method="post" action="/admin/cron-jobs/{{ .Job.ID }}/edit">

  <p>
    <label>
      Code (唯一标识)<br>
      <input type="text" name="code" id="code" value="{{ .Job.Code }}" required>
      <small>用于在代码中识别此任务，必须唯一</small>
    </label>
  </p>

  <p>
    <label>
      Name (任务名称)<br>
      <input type="text" name="name" id="name" value="{{ .Job.Name }}" required>
    </label>
  </p>

  <p>
    <label>
      Description (描述)<br>
      <textarea name="description" rows="3" cols="60">{{ .Job.Description }}</textarea>
    </label>
  </p>

  <p>
    <label>
      Schedule (Cron 表达式)<br>
      <input type="text" name="schedule" id="schedule" value="{{ .Job.Schedule }}" required placeholder="例如: 0 */5 * * *">
      <small>标准 cron 表达式，如 "0 */5 * * *" 表示每5小时执行一次</small>
    </label>
  </p>

  <p>
    <label>
      Enabled (启用状态)<br>
      <select name="enabled">
        <option value="1" {{ if eq .Job.Enabled 1 }}selected{{ end }}>启用</option>
        <option value="0" {{ if eq .Job.Enabled 0 }}selected{{ end }}>禁用</option>
      </select>
    </label>
  </p>

  <p>
    <button type="submit">Update</button>
    <a href="/admin/cron-jobs">Cancel</a>
  </p>

</form>
