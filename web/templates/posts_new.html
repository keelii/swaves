<link rel="stylesheet" href="/static/choices/choices.css" />
<script src="/static/choices/choices.min.js"></script>

<form id="form" method="post" action="/admin/posts/new">

  <p>
    <label>
      Title<br>
      <input type="text" name="title" id="title" required placeholder="文章标题">
    </label>
  </p>

  <p>
    <label>
      Slug<br>
      <input type="text" name="slug" id="slug" required placeholder="url-friendly-slug">
      <button onclick="autoSetSlug()" type="button">Auto</button>
      <button onclick="autoTranslate()" type="button">Translate</button>
      <script>
          async function autoTranslate() {
              const ret = await fetch(`/api/translate?name=${document.querySelector("#title").value}`)
              const json = await ret.json()
              if (json && json.data) {
                  document.querySelector("#slug").value = json.data
              }
          }
          async function autoSetSlug() {
              const ret = await fetch(`/api/slug?name=${document.querySelector("#title").value}`)
              const json = await ret.json()
              if (json && json.data) {
                  document.querySelector("#slug").value = json.data
              }
          }
      </script>
    </label>
  </p>

  <p>
    <label>
      状态<br>
      {{ template "partials/toggle" dict "ID" "status_new" "Name" "status" "Checked" false "DataLabels" "草稿,已发布" }}
    </label>
  </p>

  <p>
    <label>
      Tags<br>
      {{ template "partials/tag_select" . }}
    </label>
  </p>

  <p>
    <label>
      Category<br>
      {{ template "partials/category_select" dict "Root" $ }}
    </label>
  </p>

  <p>
    <label>
      Content<br>
      <textarea name="content" rows="10" cols="80" required placeholder="文章内容（支持 Markdown）"></textarea>
    </label>
  </p>

</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const tagsSelect = document.querySelector('#tags-select');
  if (tagsSelect) {
    const choices = new Choices(tagsSelect, {
      removeItemButton: true,
      searchEnabled: true,
      shouldSort: false,
      placeholder: true,
      placeholderValue: '选择或输入标签',
      duplicateItemsAllowed: false,
      addItems: true,
      editItems: false,
      delimiter: ',',
      paste: false,
      searchChoices: true,
      searchResultLimit: 10,
      renderChoiceLimit: 10
    });

    // 表单提交时处理标签
    document.querySelector('form').addEventListener('submit', function(e) {
      const selectedValues = choices.getValue(true);
      const tagIDs = [];
      const newTagNames = [];

      selectedValues.forEach(value => {
        const strValue = String(value);
        // 如果值是纯数字，说明是现有的标签ID
        // 否则是用户输入的新标签名
        if (/^\d+$/.test(strValue)) {
          tagIDs.push(strValue);
        } else {
          newTagNames.push(strValue);
        }
      });

      // 将标签 ID 和新建标签名称分别存储
      document.getElementById('tags-input').value = tagIDs.join(',');
      if (newTagNames.length > 0) {
        const newTagsInput = document.createElement('input');
        newTagsInput.type = 'hidden';
        newTagsInput.name = 'new_tags';
        newTagsInput.value = newTagNames.join(',');
        this.appendChild(newTagsInput);
      }
    });
  }

  // 处理分类选择框（单选）
  const categorySelect = document.getElementById('categories-select');
  // select 的 name 已经是 'categories'，直接使用即可
});
</script>
