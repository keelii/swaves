<link rel="stylesheet" href="/static/choices/choices.css" />
<script src="/static/choices/choices.min.js"></script>

<form id="form" method="post" action="/admin/posts/new">

  <div class="salign gap-1">
    <div class="grow">
      <p>
        <input style="width:100%;" type="text" name="title" id="title" required placeholder="文章标题">
      </p>
    </div>
    <div class="grow">
      <div class="flex gap-1">
        <div class="grow">
          <input style="width:100%;" type="text" name="slug" id="slug" required placeholder="url-friendly-slug">
        </div>
        <div class="valign gap-1">
          <button onclick="autoSetSlug()" type="button">Auto</button>
          <button onclick="autoTranslate()" type="button">Translate</button>
          <label class="valign">
              {{ template "partials/toggle" dict "ID" "status_new" "Name" "status" "Checked" false "DataLabels" "草稿,已发布" }}
          </label>
        </div>
      </div>
      <script>
          async function autoTranslate() {
              const ret = await fetch(`/api/translate?name=${document.querySelector("#title").value}`)
              const json = await ret.json()
              if (json && json.data) {
                  document.querySelector("#slug").value = json.data
              }
          }
          async function autoSetSlug() {
              const ret = await fetch(`/api/slug?name=${document.querySelector("#title").value}`)
              const json = await ret.json()
              if (json && json.data) {
                  document.querySelector("#slug").value = json.data
              }
          }
      </script>
    </div>
  </div>

  <p>
    <label>
      Tags<br>
      {{ template "partials/tag_select" . }}
    </label>
  </p>

  <p>
    <label>
      Category<br>
      {{ template "partials/category_select" dict "Root" $ }}
    </label>
  </p>

  <div class="markdown-editor-row split">
    <div class="markdown-editor-col" id="split-editor">
      <label for="content">Content</label>
      <textarea name="content" id="content" rows="10" cols="80" required placeholder="文章内容（支持 Markdown）"></textarea>
    </div>
    {{ template "partials/markdown_preview" . }}
  </div>

</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // 标签选择由 tag_select 模板处理，这里不需要重复初始化
  // 处理分类选择框（单选）
  const categorySelect = document.getElementById('categories-select');
  // select 的 name 已经是 'categories'，直接使用即可
});
</script>
