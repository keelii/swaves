<form id="form" method="post" action="/admin/posts/new">
  <div class="row">
    <div class="col-6">
      <label data-field>
        文章标题
        <input style="width:100%;" type="text" name="title" id="title" required placeholder="文章标题">
      </label>
      <label data-field>
        文章 URL 地址
        <span class="salign gap-4">
      <input class="grow" type="text" name="slug" id="slug" required placeholder="可选：默认标题">
      <button class="grow outline" onclick="autoSetSlug()" type="button">Auto</button>
    </span>
        <script>
          function autoSetSlug() {
            fetch('/api/slug?name=' + encodeURIComponent($('#title').val())).then(function(r){ return r.json(); }).then(function(json){
              if (json && json.data) $('#slug').val(json.data);
            });
          }
        </script>
      </label>

      <fieldset class="hstack">
        <legend>Kind (类型)</legend>
          {{ template "partials/form_field_radio" dict "Label" "" "Name" "kind" "Options" (slice (dict "Value" "0" "Label" "post (文章)") (dict "Value" "1" "Label" "page (页面)")) "Selected" "0" }}
      </fieldset>

      <label data-field>
        标签
          {{ template "partials/tag_select" . }}
      </label>

      <label data-field>
        分类
          {{ template "partials/category_select" dict "Root" $ }}
      </label>


    </div>
  </div>
  {{ template "partials/markdown_preview" dict "Value" "" "Required" true }}
</form>
