
<form method="post" action="/admin/posts/new">

  <p>
    <label>
      Title<br>
      <input type="text" name="title" id="title" required>
    </label>
  </p>

  <p>
    <label>
      Slug<br>
      <input type="text" name="slug" id="slug" required>
      <button onclick="autoSetSlug()" type="button">Auto</button>
      <button onclick="autoTranslate()" type="button">Translate</button>
      <script>
          async function autoTranslate() {
              const ret = await fetch(`/api/translate?name=${document.querySelector("#title").value}`)
              const json = await ret.json()
              if (json && json.data) {
                  document.querySelector("#slug").value = json.data
              }
          }
          async function autoSetSlug() {
              const ret = await fetch(`/api/slug?name=${document.querySelector("#title").value}`)
              const json = await ret.json()
              if (json && json.data) {
                  document.querySelector("#slug").value = json.data
              }
          }
      </script>
    </label>
  </p>

  <p>
    <label>
      Status<br>
      <select name="status">
        <option value="draft">Draft</option>
        <option value="published">Published</option>
      </select>
    </label>
  </p>

  <p>
    <label>
      Tags<br>
      {{ if .Tags }}
        {{ range .Tags }}
        <label style="display:inline-block; margin-right:10px;">
          <input type="checkbox" class="tag-checkbox" value="{{ .ID }}"> {{ .Name }}
        </label>
        {{ end }}
      {{ end }}
      <label>
        <input type="text" name="new_tags" placeholder="New tags: comma separated">
      </label>
      <input type="hidden" name="tags" id="tags-input">
    </label>
  </p>

  <p>
    <label>
      Category<br>
      {{template "partials/category_select" .}}
    </label>
  </p>

  <p>
    <label>
      Content<br>
      <textarea name="content" rows="10" cols="80" required></textarea>
    </label>
  </p>

  <p>
    <button type="submit">Create</button>
    <a href="/admin/posts">Cancel</a>
  </p>

</form>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const tagCheckboxes = document.querySelectorAll('.tag-checkbox:checked');
  const tagIDs = Array.from(tagCheckboxes).map(cb => cb.value);
  document.getElementById('tags-input').value = tagIDs.join(',');

  // 处理分类选择框（单选）
  const categorySelect = document.getElementById('categories-select');
  const categoryID = categorySelect.value;
  // 如果选择了分类，将其转换为逗号分隔的字符串（与后端处理逻辑一致）
  const categoryInput = document.createElement('input');
  categoryInput.type = 'hidden';
  categoryInput.name = 'categories';
  categoryInput.value = categoryID || '';
  // 移除原来的 select name，避免重复提交
  categorySelect.removeAttribute('name');
  document.querySelector('form').appendChild(categoryInput);
});
</script>
