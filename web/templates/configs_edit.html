<h1>Settings</h1>

<form method="post" action="/admin/configs">

  <p>
    <label>Name</label>
    <input type="text" name="name" value="{{ .Config.Name }}" required>
  </p>

  <p>
    <label>Language</label>
    <input type="text" name="language" value="{{ .Config.Language }}" required>
  </p>

  <p>
    <label>Timezone</label>
    <input type="text" name="timezone" value="{{ .Config.Timezone }}" required>
  </p>

  <p>
    <label>Post Slug Pattern</label>
    <input type="text" name="post_slug_pattern" value="{{ .Config.PostSlugPattern }}" required>
  </p>

  <p>
    <label>Tag Slug Pattern</label>
    <input type="text" name="tag_slug_pattern" value="{{ .Config.TagSlugPattern }}" required>
  </p>

  <p>
    <label>Tags Pattern</label>
    <input type="text" name="tags_pattern" value="{{ .Config.TagsPattern }}" required>
  </p>

  <p>
    <label>Giscus Config (JSON)</label>
    <textarea name="giscus_config" rows="5" cols="80">{{ .Config.GiscusConfig }}</textarea>
  </p>

  <p>
    <label>GA4 ID</label>
    <input type="text" name="ga4_id" value="{{ .Config.GA4ID }}">
  </p>

  <p>
    <label>Admin Password (leave empty to keep current)</label>
    <input type="password" name="admin_password">
  </p>

  <p>
    <button type="submit">Save</button>
  </p>

</form>
