{{ if .Error }}
<p style="color: orange;">Warning: {{ .Error }}</p>
{{ end }}

<form id="form" method="post" action="/admin/import/preview">

  <input type="hidden" name="items_count" value="{{ len .Items }}">

  <table>
    <thead>
    <tr>
       <th>文件名</th>
       <th>标题 (来源: {{ .TitleSourceDesc }})</th>
       <th>URL标识 (来源: {{ .SlugSourceDesc }})</th>
       <th>
         状态 (来源: {{ .StatusSourceDesc }})
         <button type="button" id="toggle-status-btn" style="margin-left: 8px; padding: 2px 8px; font-size: 12px;">切换</button>
       </th>
       <th>创建时间 (来源: {{ .CreatedSourceDesc }})</th>
       <th>标签</th>
       <th>分类</th>
       <th>内容</th>
    </tr>
    </thead>
    <tbody>
    {{ range .Items }}
    <tr>
      <td>
        <input type="hidden" name="items[{{ .Index }}][filename]" value="{{ .Filename }}">
        {{ .Filename }}
      </td>
      <td>
        <input type="text" name="items[{{ .Index }}][title]" value="{{ .Title }}" required style="width: 100%;">
      </td>
      <td>
        <input type="text" name="items[{{ .Index }}][slug]" value="{{ .Slug }}" required style="width: 100%;">
      </td>
      <td>
        <select name="items[{{ .Index }}][status]" style="width: 100%;">
          <option value="draft" {{ if eq .Status "draft" }}selected{{ end }}>draft</option>
          <option value="published" {{ if eq .Status "published" }}selected{{ end }}>published</option>
        </select>
      </td>
      <td>
        <input type="hidden" name="items[{{ .Index }}][created_at_unix]" value="{{ .CreatedAtUnix }}">
        <input type="text" name="items[{{ .Index }}][created_at]" value="{{ .CreatedAt }}" placeholder="YYYY-MM-DD HH:MM:SS" style="width: 100%;">
      </td>
      <td>
        <input type="text" name="items[{{ .Index }}][tags]" value="{{ .Tags }}" placeholder="tag1, tag2" style="width: 100%;">
      </td>
      <td>
        <input type="text" name="items[{{ .Index }}][category]" value="{{ .Category }}" placeholder="category name" style="width: 100%;">
      </td>
      <td>
        <textarea name="items[{{ .Index }}][content]" rows="5" style="width: 100%;">{{ .Content }}</textarea>
      </td>
    </tr>
    {{ end }}
    </tbody>
  </table>

</form>

<script>
(function() {
  const toggleBtn = document.getElementById('toggle-status-btn');
  if (!toggleBtn) return;

  toggleBtn.addEventListener('click', function() {
    // 获取所有的 status select 元素
    const statusSelects = document.querySelectorAll('select[name*="[status]"]');
    
    if (statusSelects.length === 0) return;

    // 检查是否所有行都是 draft
    let allDraft = true;
    for (let select of statusSelects) {
      if (select.value !== 'draft') {
        allDraft = false;
        break;
      }
    }

    // 根据当前状态切换：如果全是 draft，则全切换为 published；否则全切换为 draft
    const newValue = allDraft ? 'published' : 'draft';
    
    for (let select of statusSelects) {
      select.value = newValue;
    }
  });
})();
</script>
