<h1>Posts</h1>

<p>
  <a href="/admin/posts/new">New Post</a>
</p>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Slug</th>
    <th>Status</th>
    <th>Actions</th>
  </tr>
  </thead>

  <tbody>
  {{ range .Posts }}
  <tr>
    <td>{{ .ID }}</td>
    <td>{{ .Title }}</td>
    <td>{{ .Slug }}</td>
    <td>{{ .Status }}</td>
    <td>
      <a href="/admin/posts/{{ .ID }}/edit">Edit</a>

      <form method="post" style="display:inline" action="/admin/posts/{{ .ID }}/delete">
        <button type="submit">Delete</button>
      </form>
    </td>
  </tr>
  {{ else }}
  <tr>
    <td colspan="5">No posts</td>
  </tr>
  {{ end }}
  </tbody>
</table>
