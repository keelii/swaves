{% set label = Label|default("过期时间") %}
{% if ReadOnly|default(false) %}
<label data-field>
  {{ label }}{% if LabelSuffix %} {{ LabelSuffix }}{% endif %}
  {% if HasExpiry|default(false) %}
  <span>{{ DisplayDate|default("—") }}</span>
  {% else %}
  <span>永不过期</span>
  {% endif %}
</label>
{% else %}
<fieldset data-field>
  <legend>{{ label }}{% if LabelSuffix %} {{ LabelSuffix }}{% endif %}</legend>
  <div class="hstack" style="flex-wrap: wrap;">
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="none"{% if not HasExpiry|default(false) %} checked{% endif %}> 永不过期</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="1min"> 1 分钟</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="5min"> 5 分钟</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="1hour"> 1 小时</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="1day"> 1 天</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="custom"{% if HasExpiry|default(false) %} checked{% endif %}> 自定义</label>
  </div>
  <div id="custom-date-container" class="mt-2" style="display: {% if HasExpiry|default(false) %}block{% else %}none{% endif %};">
    <input class="w-100" type="datetime-local" name="expires_at_custom" id="expires_at_custom" value="{{ CustomDate }}">
  </div>
</fieldset>
<script>
$(function() {
  var $opt = $('input[name="expires_at_option"]'), $customWrap = $('#custom-date-container'), $custom = $('#expires_at_custom');
  function toggleCustomDate() {
    if ($opt.filter(':checked').val() === 'custom') {
      $customWrap.show();
    } else {
      $customWrap.hide();
      $custom.val('');
    }
  }
  $opt.on('change', toggleCustomDate);
  toggleCustomDate();
});
</script>
{% endif %}
