<nav role="tablist" aria-label="内容类型">
  <a role="tab" aria-selected="{% if kind == 0 %}true{% else %}false{% endif %}" href="{{ UrlFor('admin.posts.list') }}?kind=0{% if q %}&q={{ q }}{% endif %}{% if tag %}&tag={{ tag }}{% endif %}{% if cat %}&category={{ cat }}{% endif %}">文章 ({{ CountPost }})</a>
  <a role="tab" aria-selected="{% if kind == 1 %}true{% else %}false{% endif %}" href="{{ UrlFor('admin.posts.list') }}?kind=1{% if q %}&q={{ q }}{% endif %}{% if tag %}&tag={{ tag }}{% endif %}{% if cat %}&category={{ cat }}{% endif %}">页面 ({{ CountPage }})</a>
</nav>
<nav role="tablist" aria-label="内容类型">
  <a role="tab" href="{{ UrlFor('admin.encrypted_posts.list') }}" {% if UrlIs("admin.encrypted_posts.list") %}aria-selected="true"{% endif %}>加密文章 ({{ CountEncryptedPost }})</a>
</nav>
