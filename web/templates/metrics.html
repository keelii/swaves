<style>
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .metrics-card {
    border: 1px solid var(--nc-bg-3);
    border-radius: 8px;
    padding: 12px;
    background: var(--nc-bg-1);
  }
  .metrics-label {
    font-size: 12px;
    color: var(--nc-tx-2);
    margin-bottom: 6px;
  }
  .metrics-value {
    font-size: 28px;
    font-weight: 600;
  }
  .metrics-section-title {
    margin: 18px 0 8px;
  }
  .metrics-table td:last-child,
  .metrics-table th:last-child {
    text-align: right;
  }
</style>

<div class="metrics-grid">
  <div class="metrics-card">
    <div class="metrics-label">站点 UV（累计去重）</div>
    <div class="metrics-value">{{ .SiteUV }}</div>
  </div>
</div>

<h4 class="metrics-section-title">文章 UV Top 10</h4>
<table class="metrics-table">
  <thead>
    <tr>
      <th>#</th>
      <th>标题</th>
      <th>UV</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody>
    {{ if .TopPosts }}
      {{ range $index, $item := .TopPosts }}
      <tr>
        <td>{{ add $index 1 }}</td>
        <td>{{ $item.Title }}</td>
        <td>{{ $item.UV }}</td>
        <td><a href="/admin/posts/{{ $item.PostID }}/edit">编辑</a></td>
      </tr>
      {{ end }}
    {{ else }}
      <tr>
        <td colspan="4">暂无 UV 数据</td>
      </tr>
    {{ end }}
  </tbody>
</table>

<h4 class="metrics-section-title">系统监控</h4>
<div>
  <iframe src="/metrics" style="width: 100%; height:960px; border: none;"></iframe>
</div>
