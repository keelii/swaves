
<form method="post" action="/admin/redirects/{{ .Redirect.ID }}/edit">

  <p>
    <label>ID:</label> {{ .Redirect.ID }}
  </p>

  <p>
    <label>
      From<br>
      <input type="text" name="from" value="{{ .Redirect.From }}" required>
    </label>
  </p>

  <p>
    <label>
      To<br>
      <input type="text" name="to" value="{{ .Redirect.To }}" required>
    </label>
  </p>

  <p>
    <label>
      Status (状态码)<br>
      <select name="status">
        <option value="301" {{ if eq .Redirect.Status 301 }}selected{{ end }}>301 - Permanent Redirect</option>
        <option value="302" {{ if eq .Redirect.Status 302 }}selected{{ end }}>302 - Temporary Redirect</option>
      </select>
    </label>
  </p>

  <p>
    <button type="submit">Save</button>
    <a href="/admin/redirects">Back</a>
  </p>

</form>
