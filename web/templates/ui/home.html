<header>
  <h1>{{ settings "site_title" }}</h1>
  <nav>
    <a href="{{ settings "site_base" }}">首页</a>
    /
      {{ range .Pages}}
        <a href="{{ .PostLink }}">{{ .Title }}</a>
      {{ end }}
    /
    <a href="{{ settings "rss_path" }}">RSS</a>
  </nav>
</header>

<ul class="articles">
  {{ range .Articles }}
  <li>
    <a href="{{ .PostLink }}">{{ .Title }}</a>
    <span class="published">{{ relativeTime .PublishedAt }}</span>
  </li>
  {{ else }}
  <li>No posts</li>
  {{ end }}
</ul>

{{template "ui/pagination" .}}
