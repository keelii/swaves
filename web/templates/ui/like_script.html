<script>
  (function () {
    if (window.__swavesLikeAsyncInit) {
      return;
    }
    window.__swavesLikeAsyncInit = true;

    function toLikeCount(value) {
      var count = Number.parseInt(value, 10);
      if (Number.isNaN(count) || count < 0) {
        return 0;
      }
      return count;
    }

    function updateLikeButton(button, likeCount) {
      console.log(button.getAttribute("data-text"))
      button.textContent = button.getAttribute("data-text").replace("{CNT}", likeCount);
    }

    async function handleLikeSubmit(event) {
      event.preventDefault();

      var form = event.currentTarget;
      var button = form.querySelector("[data-like-button]");
      if (!button || button.disabled) {
        return;
      }

      var previousText = button.textContent;
      button.disabled = true;

      try {
        var response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: {
            Accept: "application/json",
            "X-Requested-With": "XMLHttpRequest"
          }
        });

        if (!response.ok) {
          throw new Error("like request failed");
        }

        var result = await response.json();
        updateLikeButton(button, toLikeCount(result.likeCount));
      } catch (error) {
        button.textContent = previousText;
      } finally {
        button.disabled = false;
      }
    }

    var forms = document.querySelectorAll("[data-like-form]");
    forms.forEach(function (form) {
      form.addEventListener("submit", handleLikeSubmit);
    });
  })();
</script>
