
<form id="form" method="post" action="/admin/encrypted-posts/new">

  <p>
    <label>
      Title<br>
      <input type="text" name="title" required>
    </label>
  </p>

  <p>
    <label>
      Password (only for others)<br>
      <input type="password" name="password">
    </label>
  </p>

  <p>
    <label>
      Expires At<br>
      <div class="valign gap-10">
        <label class="valign gap-5"><input type="radio" name="expires_at_option" value="none" checked onchange="toggleCustomDate()"> Never</label>
        <label class="valign gap-5"><input type="radio" name="expires_at_option" value="5min" onchange="toggleCustomDate()"> 5 minutes</label>
        <label class="valign gap-5"><input type="radio" name="expires_at_option" value="1hour" onchange="toggleCustomDate()"> 1 hour</label>
        <label class="valign gap-5"><input type="radio" name="expires_at_option" value="1day" onchange="toggleCustomDate()"> 1 day</label>
        <label class="valign gap-5"><input type="radio" name="expires_at_option" value="custom" onchange="toggleCustomDate()"> Other</label>
        <div id="custom-date-container" style="display: none;">
          <input type="datetime-local" name="expires_at_custom" id="expires_at_custom">
        </div>
      </div>
      <input type="hidden" name="expires_at" id="expires_at_hidden">
    </label>
  </p>

  <script>
    function toggleCustomDate() {
      const customContainer = document.getElementById('custom-date-container');
      const customInput = document.getElementById('expires_at_custom');
      const hiddenInput = document.getElementById('expires_at_hidden');
      const selected = document.querySelector('input[name="expires_at_option"]:checked');
      
      if (selected && selected.value === 'custom') {
        customContainer.style.display = 'block';
      } else {
        customContainer.style.display = 'none';
        customInput.value = '';
      }
    }

    // 表单提交前设置 expires_at 值
    document.querySelector('form').addEventListener('submit', function(e) {
      const selected = document.querySelector('input[name="expires_at_option"]:checked');
      const hiddenInput = document.getElementById('expires_at_hidden');
      const customInput = document.getElementById('expires_at_custom');
      
      if (selected.value === 'custom' && customInput.value) {
        hiddenInput.value = customInput.value;
      } else if (selected.value === 'none') {
        hiddenInput.value = '';
      } else {
        // 计算相对时间
        const now = new Date();
        let expiresAt = new Date();
        switch(selected.value) {
          case '5min':
            expiresAt = new Date(now.getTime() + 5 * 60 * 1000);
            break;
          case '1hour':
            expiresAt = new Date(now.getTime() + 60 * 60 * 1000);
            break;
          case '1day':
            expiresAt = new Date(now.getTime() + 24 * 60 * 60 * 1000);
            break;
        }
        // 格式化为 datetime-local 格式
        const year = expiresAt.getFullYear();
        const month = String(expiresAt.getMonth() + 1).padStart(2, '0');
        const day = String(expiresAt.getDate()).padStart(2, '0');
        const hours = String(expiresAt.getHours()).padStart(2, '0');
        const minutes = String(expiresAt.getMinutes()).padStart(2, '0');
        hiddenInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
      }
    });
  </script>

  <p>
    <label>
      Content<br>
      <textarea name="content" rows="10" cols="80" required></textarea>
    </label>
  </p>

</form>
