
<form id="form" method="post" action="/admin/encrypted-posts/new">

  <p>
    <label>
      Title<br>
      <input type="text" name="title" required placeholder="加密文章标题">
    </label>
  </p>

  <p>
    <label>
      Password (only for others)<br>
      <input type="password" name="password" placeholder="可选密码（仅用于他人访问）">
    </label>
  </p>

  <p>
    {{ template "partials/expires_at_field" dict "CustomDate" "" "HasExpiry" false }}
  </p>

  {{ template "partials/markdown_preview" dict "Placeholder" "加密文章内容（支持 Markdown）" "Value" "" "Required" true }}

</form>
