{% set selectName = SelectName %}
{% set selectID = SelectID %}
{% if Root.CategoryOptions %}
  {% set options = Root.CategoryOptions %}
{% else %}
  {% set options = Root.Categories %}
{% endif %}
<select class="ui-input ui-select-input" name="{{ selectName }}"{% if selectID %} id="{{ selectID }}"{% endif %}>
  {% if EmptyOption %}
    <option value="">{{ EmptyOption }}</option>
  {% else %}
    <option value="">顶级分类</option>
  {% endif %}
  {% for category in options %}
    <option value="{{ category.ID }}" {% if SelectedID == category.ID %}selected{% endif %}>{{ category.DisplayName }}</option>
  {% endfor %}
</select>
