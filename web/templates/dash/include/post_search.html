<style>
  .posts-search-form .ui-input {
    font-size: inherit;
    line-height: initial;
  }
</style>
<form method="get" action="{{ UrlFor('dash.posts.list') }}" class="posts-search-form" id="posts-search-form">
  <input type="hidden" name="kind" value="{{ KindQuery }}">
  {% if FilterTagIDStr %}<input type="hidden" name="tag" value="{{ FilterTagIDStr }}">{% endif %}
  {% if FilterCategoryIDStr %}<input type="hidden" name="category" value="{{ FilterCategoryIDStr }}">{% endif %}
  <input class="ui-input post-search" type="search" name="q" value="{{ SearchQuery }}"{% if SearchQuery %} autofocus{% endif %} placeholder="搜索标题、内容" id="posts-search-input">
</form>
<script>
(function(){
  var form = document.getElementById('posts-search-form');
  var input = document.getElementById('posts-search-input');
  if (!form || !input) return;

  function focusSearchToEnd() {
    if (!input.value) {
      return;
    }
    window.requestAnimationFrame(function() {
      input.focus({ preventScroll: true });
      var end = input.value.length;
      input.setSelectionRange(end, end);
    });
  }

  focusSearchToEnd();

  input.addEventListener('search', function() {
    form.requestSubmit();
  });

  input.addEventListener('input', function(event){
    if (event instanceof InputEvent) {
      return;
    }
    form.requestSubmit();
  });
})();
</script>
