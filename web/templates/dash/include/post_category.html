{% set selectedCategoryID = SelectedCategoryID|default(0) %}
<select class="ui-select mini noborder" style="width:7em;" id="post-category-select" name="categories" form="form" aria-label="分类选择">
  <option value="">顶级分类</option>
  {% for category in CategoryOptions|default([]) %}
    <option value="{{ category.ID }}"{% if selectedCategoryID == category.ID %} selected{% endif %}>{{ category.DisplayName|default(category.Name) }}</option>
  {% endfor %}
</select>
