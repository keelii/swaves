<tr data-import-item-row data-post-id="{{ Item.PostID }}">
  <td>
    <div class="import-field-stack">
      <input type="hidden" data-field="post_id" value="{{ Item.PostID }}">
      <input type="hidden" data-field="filename" value="{{ Item.Filename }}">
      <input type="hidden" data-field="created_at_unix" value="{{ Item.CreatedAtUnix }}">
      <input class="ui-input" type="text" data-field="title" value="{{ Item.Title }}" required>
      <input class="ui-input" type="text" data-field="slug" value="{{ Item.Slug }}" required>
      <input class="ui-input" type="datetime-local" data-field="created_at" value="{{ Item.CreatedAt }}" placeholder="YYYY-MM-DD HH:MM:SS（可选）">
    </div>
  </td>
  <td>
    <div class="valign">
      <label class="ui-radio-field"><input class="ui-radio" type="radio" data-field="status" name="import_status_{{ Item.PostID }}" value="draft" {% if Item.Status == "draft" %}checked{% endif %}><span class="ui-radio-label">草稿</span></label>
      <label class="ui-radio-field"><input class="ui-radio" type="radio" data-field="status" name="import_status_{{ Item.PostID }}" value="published" {% if Item.Status == "published" %}checked{% endif %}><span class="ui-radio-label">已发布</span></label>
    </div>
  </td>
  <td>
    <div class="valign">
      <label class="ui-radio-field"><input class="ui-radio" type="radio" data-field="kind" name="import_kind_{{ Item.PostID }}" value="0" {% if (Item.Kind == "0") or (Item.Kind == "") %}checked{% endif %}><span class="ui-radio-label">文章</span></label>
      <label class="ui-radio-field"><input class="ui-radio" type="radio" data-field="kind" name="import_kind_{{ Item.PostID }}" value="1" {% if Item.Kind == "1" %}checked{% endif %}><span class="ui-radio-label">页面</span></label>
    </div>
  </td>
  <td>
    <div class="import-field-stack">
      <input class="ui-input" type="text" data-field="tags" value="{{ Item.Tags }}" placeholder="标签1, 标签2">
      <select class="ui-input ui-select-input" data-field="category" data-selected="{{ Item.Category }}" data-categories="{{ Item.Categories }}"></select>
      <input type="hidden" data-field="categories" value="{{ Item.Categories }}">
    </div>
  </td>
  <td>
    <div class="cell-content">
      <textarea class="ui-textarea" data-field="content" hidden>{{ Item.Content }}</textarea>
      <div class="import-item-content">{% if Item.ContentPreview %}{{ Item.ContentPreview }}{% else %}-{% endif %}</div>
    </div>
  </td>
  <td data-import-edit-status>
    <div class="import-row-status">
      <div class="import-row-status-label">待确认</div>
      <div class="import-row-status-detail" hidden></div>
    </div>
  </td>
  <td data-import-edit-action>
    <div class="import-row-actions">
      {{ sui.IconButton("save", "保存", attrs='type="button" data-title="保存" data-import-row-save-btn') }}
      {{ sui.IconButton("undo", "重试导入", attrs='type="button" data-title="重试导入" data-import-row-retry-btn hidden') }}
    </div>
  </td>
</tr>
