<div autofocus role="region" aria-label="文章内容编辑器" class="content-editor" spellcheck="false">
  <div class="title">
    <input type="text" name="title" value="{{ TitleValue }}" class="input-title" id="post-title" form="form"{% if TitlePlaceholder %} placeholder="{{ TitlePlaceholder }}"{% endif %} required>
  </div>
  <div class="content wysiwyg"></div>
</div>

<textarea id="post-content" name="content" form="form" hidden>{{ ContentValue }}</textarea>
{% if StatusValue is not none and StatusValue != "" %}
<input type="hidden" name="status" value="{{ StatusValue }}" form="form">
{% endif %}
<input type="hidden" name="comment_enabled" value="{{ CommentEnabledValue }}" form="form">
<input type="hidden" name="kind" value="{{ KindValue }}" form="form">
<input type="hidden" name="tags" value="{{ TagsValue }}" form="form">
<form id="form" method="post" action="{{ FormAction }}">
  {{ _csrf_token() }}
</form>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var titleInput = document.getElementById("post-title");
    var textarea = document.getElementById("post-content");
    var wordCount = document.getElementById("post-editor-word-count");
    var slugInput = document.getElementById("post-slug");
    var autoSyncSlug = {% if AutoSyncSlug %}true{% else %}false{% endif %};
    var slugAPIURL = {{ SlugAPIURL | tojson }};
    var slugSyncTimer = null;
    var slugSyncSeq = 0;

    function updateWordCount(nextMarkdown) {
      if (!wordCount) {
        return;
      }
      var text = "";
      if (titleInput) {
        text += String(titleInput.value || "") + "\n";
      }
      if (typeof nextMarkdown === "string") {
        text += nextMarkdown;
      } else if (textarea) {
        text += String(textarea.value || "");
      }
      text = text.replace(/\s+/g, "").trim();
      wordCount.textContent = "字数 " + text.length;
    }

    function syncSlugFromTitle() {
      if (!autoSyncSlug || !titleInput || !slugInput || !slugAPIURL) {
        return;
      }

      var name = String(titleInput.value || "").trim();
      if (!name) {
        slugInput.value = "";
        return;
      }

      var seq = ++slugSyncSeq;
      var requestURL = new URL(slugAPIURL, window.location.origin);
      requestURL.searchParams.set("name", name);

      fetch(requestURL.toString(), {
        method: "GET",
        credentials: "same-origin",
        headers: { "Accept": "application/json" }
      }).then(function(response) {
        if (!response.ok) {
          return null;
        }
        return response.json();
      }).then(function(json) {
        if (seq !== slugSyncSeq) {
          return;
        }
        if (json && json.data) {
          slugInput.value = String(json.data);
        }
      }).catch(function() {
        // Slug sync is best-effort; ignore fetch errors.
      });
    }

    function scheduleSlugSync() {
      if (slugSyncTimer) {
        window.clearTimeout(slugSyncTimer);
      }
      slugSyncTimer = window.setTimeout(syncSlugFromTitle, 160);
    }

    if (!window.SEditor || typeof window.SEditor.init !== "function") {
      updateWordCount();
      return;
    }

    window.__seditor = window.SEditor.init({
      mount: ".content",
      textarea: "#post-content",
      placeholder: "输入内容",
      onChange: function(markdown) {
        updateWordCount(markdown);
      }
    });

    if (titleInput) {
      titleInput.addEventListener("input", updateWordCount);
      titleInput.addEventListener("input", scheduleSlugSync);
    }
    if (textarea) {
      textarea.addEventListener("input", updateWordCount);
    }

    updateWordCount();
    syncSlugFromTitle();
  });
</script>
