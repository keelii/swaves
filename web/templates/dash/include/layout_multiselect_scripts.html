<script>
  (function() {
    var multiselectToggles = document.querySelectorAll('[data-role="toggle-multiselect"][data-target-table]');
    if (!multiselectToggles || multiselectToggles.length === 0) {
      return;
    }

    function openDialog(id, opener) {
      return window.DashAppUI.dialog.open(id, opener);
    }

    function closeDialog(id) {
      return window.DashAppUI.dialog.close(id);
    }

    var multiselectConfirmDialog = document.getElementById('multiselect-confirm-dialog');
    var multiselectConfirmMessage = document.getElementById('multiselect-confirm-message');
    var multiselectConfirmOK = document.getElementById('multiselect-confirm-ok');
    var multiselectConfirmResolver = null;

    function resolveMultiselectConfirm(value) {
      if (!multiselectConfirmResolver) {
        return;
      }
      var resolve = multiselectConfirmResolver;
      multiselectConfirmResolver = null;
      resolve(!!value);
    }

    function isMultiselectConfirmOpen() {
      if (!multiselectConfirmDialog) {
        return false;
      }
      return !multiselectConfirmDialog.hasAttribute('hidden');
    }

    if (multiselectConfirmOK && !multiselectConfirmOK.hasAttribute('data-bind-confirm')) {
      multiselectConfirmOK.setAttribute('data-bind-confirm', '1');
      multiselectConfirmOK.addEventListener('click', function() {
        resolveMultiselectConfirm(true);
        closeDialog('multiselect-confirm-dialog');
      });
    }

    if (multiselectConfirmDialog && !multiselectConfirmDialog.hasAttribute('data-bind-confirm')) {
      multiselectConfirmDialog.setAttribute('data-bind-confirm', '1');
      multiselectConfirmDialog.addEventListener('click', function(event) {
        if (event.target === multiselectConfirmDialog) {
          resolveMultiselectConfirm(false);
        }
      });

      document.addEventListener('click', function(event) {
        var cancelButton = event.target.closest(
          '#multiselect-confirm-dialog [data-role~="ui-dialog-close"], #multiselect-confirm-dialog [data-role~="ui-dialog-cancel"]'
        );
        if (cancelButton) {
          resolveMultiselectConfirm(false);
        }
      });

      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && isMultiselectConfirmOpen()) {
          window.setTimeout(function() {
            resolveMultiselectConfirm(false);
          }, 0);
        }
      });
    }

    function askMultiselectConfirm(message) {
      if (!multiselectConfirmDialog || !multiselectConfirmMessage) {
        return Promise.resolve(window.confirm(message));
      }

      return new Promise(function(resolve) {
        if (multiselectConfirmResolver) {
          resolveMultiselectConfirm(false);
        }
        multiselectConfirmMessage.textContent = message || '';
        if (!openDialog('multiselect-confirm-dialog')) {
          resolve(window.confirm(message));
          return;
        }
        multiselectConfirmResolver = resolve;
      });
    }

    function bindTableMultiselect(tableId) {
      if (!tableId) {
        return;
      }

      var table = document.getElementById(tableId);
      if (!table) {
        return;
      }

      var wrap = table.closest('.data-table-wrap');
      if (!wrap) {
        return;
      }

      var toggle = document.querySelector('[data-role="toggle-multiselect"][data-target-table="' + tableId + '"]');
      var statusCount = document.querySelector('[data-role="multiselect-selected-count"][data-target-table="' + tableId + '"]');
      var batchDelete = document.querySelector('[data-role="multiselect-batch-delete"][data-target-table="' + tableId + '"]');
      var batchRestore = document.querySelector('[data-role="multiselect-batch-restore"][data-target-table="' + tableId + '"]');
      var batchDeleteAPI = (table.getAttribute('data-batch-delete-url') || '').trim();
      var batchRestoreAPI = (table.getAttribute('data-batch-restore-url') || '').trim();

      function selectedRowCheckboxes() {
        return table.querySelectorAll('tbody .cell-checkbox:checked');
      }

      function parsePositiveInt(raw) {
        var parsed = parseInt(raw, 10);
        if (isNaN(parsed) || parsed <= 0) {
          return 0;
        }
        return parsed;
      }

      function getDeleteFormFromRow(row) {
        if (!row) {
          return null;
        }
        var actionForm = row.querySelector('.cell-actions form[action*="/delete"]');
        if (actionForm) {
          return actionForm;
        }
        return row.querySelector('form[action*="/delete"]');
      }

      function getBatchDeleteIDFromRow(row) {
        if (!row) {
          return 0;
        }

        var explicitID = parsePositiveInt(row.getAttribute('data-batch-delete-id'));
        if (explicitID > 0) {
          return explicitID;
        }

        var form = getDeleteFormFromRow(row);
        if (!form || !form.action) {
          return 0;
        }

        var action = form.action || '';
        var matched = action.match(/\/(\d+)\/delete(?:[/?#]|$)/);
        if (!matched || !matched[1]) {
          matched = action.match(/\/(\d+)(?:[/?#]|$)/);
        }
        if (!matched || !matched[1]) {
          return 0;
        }

        return parsePositiveInt(matched[1]);
      }

      function selectedRows() {
        var rows = [];
        var checked = selectedRowCheckboxes();
        checked.forEach(function(item) {
          var row = item.closest('tr');
          if (row) {
            rows.push(row);
          }
        });
        return rows;
      }

      function collectSelectedRowState(rows) {
        var ids = [];
        var idSeen = {};
        var rowsByID = {};
        var unresolvedCount = 0;

        rows.forEach(function(row) {
          var id = getBatchDeleteIDFromRow(row);
          if (id <= 0) {
            unresolvedCount += 1;
            return;
          }
          if (!rowsByID[id]) {
            rowsByID[id] = [];
          }
          rowsByID[id].push(row);
          if (idSeen[id]) {
            return;
          }
          idSeen[id] = true;
          ids.push(id);
        });

        return {
          ids: ids,
          rowsByID: rowsByID,
          unresolvedCount: unresolvedCount,
        };
      }

      function postBatchActionRequest(apiURL, ids) {
        var payload = JSON.stringify({ ids: ids });
        return window.sfetchJSON(apiURL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: payload,
        });
      }

      function summarizeBatchItems(items, key, limit) {
        if (!Array.isArray(items) || items.length === 0) {
          return '';
        }

        return items.slice(0, limit).map(function(item) {
          var id = parsePositiveInt(item && item.id);
          var text = item && item[key] ? item[key] : '';

          if (!text) {
            return '';
          }
          if (id > 0) {
            return '#' + id + '：' + text;
          }
          return text;
        }).filter(Boolean).join('；');
      }

      function buildBatchDeleteMessage(body, successCount, failedCount) {
        var message = '批量删除完成：成功 ' + successCount + '，失败 ' + failedCount + '。';
        var failedText = summarizeBatchItems(body && body.failed, 'error', 3);
        var warningText = summarizeBatchItems(body && body.warnings, 'warning', 2);

        if (failedText) {
          message += ' 失败原因：' + failedText;
          if (Array.isArray(body.failed) && body.failed.length > 3) {
            message += '；...';
          }
        }
        if (warningText) {
          message += ' 警告：' + warningText;
          if (Array.isArray(body.warnings) && body.warnings.length > 2) {
            message += '；...';
          }
        }
        return message;
      }

      function buildBatchRestoreMessage(body, successCount, failedCount) {
        if (failedCount > 0) {
          return '批量恢复完成：成功 ' + successCount + '，失败 ' + failedCount + '。';
        }
        return '已成功恢复 ' + successCount + ' 项。';
      }

      function performLegacyBatchDelete(rows) {
        var successCount = 0;
        var failedCount = 0;
        var chain = Promise.resolve();

        rows.forEach(function(row) {
          chain = chain.then(function() {
            var form = getDeleteFormFromRow(row);
            if (!form || !form.action) {
              failedCount += 1;
              return;
            }

            var method = (form.getAttribute('method') || 'POST').toUpperCase();
            var formData = new FormData(form);
            var send = window.sfetch(form.action, { method: method, body: formData });

            return send.then(function(resp) {
              if (!resp || !resp.ok) {
                throw new Error('delete failed');
              }
              successCount += 1;
              row.remove();
            }).catch(function(err) {
              console.warn('legacy batch delete failed', err);
              failedCount += 1;
            });
          });
        });

        return chain.then(function() {
          return {
            successCount: successCount,
            failedCount: failedCount,
            message: buildBatchDeleteMessage(null, successCount, failedCount),
          };
        });
      }

      function removeRowsByIDMap(rowsByID, idList) {
        var successCount = 0;

        idList.forEach(function(idRaw) {
          var id = parsePositiveInt(idRaw);
          if (id <= 0 || !rowsByID[id]) {
            return;
          }
          successCount += 1;
          rowsByID[id].forEach(function(row) {
            row.remove();
          });
          delete rowsByID[id];
        });

        return successCount;
      }

      function performAPIBatchAction(rows, options) {
        var selection = collectSelectedRowState(rows);

        if (selection.ids.length === 0) {
          return Promise.resolve({
            successCount: 0,
            failedCount: rows.length,
            message: options.buildMessage(null, 0, rows.length),
          });
        }

        return postBatchActionRequest(options.apiURL, selection.ids).then(function(result) {
          var body = result && result.body ? result.body : {};
          var successIDs = Array.isArray(body[options.successIDsKey]) ? body[options.successIDsKey] : [];
          var failedItems = options.failedItemsKey && Array.isArray(body[options.failedItemsKey]) ? body[options.failedItemsKey] : [];
          var successCount = removeRowsByIDMap(selection.rowsByID, successIDs);

          var failedCount = selection.unresolvedCount;
          if (failedItems.length > 0) {
            failedCount += failedItems.length;
          } else {
            var failedFromBody = parsePositiveInt(body[options.failedCountKey]);
            if (failedFromBody > 0) {
              failedCount += failedFromBody;
            } else {
              var inferredFailed = selection.ids.length - successCount;
              if (inferredFailed > 0) {
                failedCount += inferredFailed;
              }
            }
          }

          return {
            successCount: successCount,
            failedCount: failedCount,
            message: options.buildMessage(body, successCount, failedCount),
          };
        }).catch(function(err) {
          console.warn(options.logLabel, err);
          return {
            successCount: 0,
            failedCount: rows.length,
            message: options.buildMessage(null, 0, rows.length),
          };
        });
      }

      function bindBatchAction(button, options) {
        if (!button || (!options.apiURL && !options.fallback)) {
          return;
        }

        button.addEventListener('click', function(event) {
          event.preventDefault();
          var rows = selectedRows();
          if (!rows || rows.length === 0) {
            syncSelectionStatus();
            return;
          }

          var confirmStep = options.confirmMessage
            ? askMultiselectConfirm(options.confirmMessage(rows))
            : Promise.resolve(true);

          confirmStep.then(function(confirmed) {
            if (!confirmed) {
              return;
            }

            button.disabled = true;
            var runAction = options.apiURL
              ? performAPIBatchAction(rows, options)
              : options.fallback(rows);

            return runAction.then(function(result) {
              var successCount = result && typeof result.successCount === 'number' ? result.successCount : 0;
              var failedCount = result && typeof result.failedCount === 'number' ? result.failedCount : 0;
              var message = result && result.message ? result.message : options.buildMessage(null, successCount, failedCount);

              if (successCount > 0 || failedCount > 0) {
                notify(message, options.title);
              }

              if (options.doneEventName) {
                document.dispatchEvent(new CustomEvent(options.doneEventName, {
                  detail: {
                    tableId: tableId,
                    successCount: successCount,
                    failedCount: failedCount
                  }
                }));
              }
            }).finally(function() {
              syncSelectAllState();
            });
          });
        });
      }

      function syncSelectionStatus() {
        var checkedCount = selectedRowCheckboxes().length;
        if (statusCount) {
          statusCount.textContent = '已选择 ' + checkedCount + ' 项';
        }
        if (batchDelete) {
          batchDelete.disabled = checkedCount === 0;
        }
        if (batchRestore) {
          batchRestore.disabled = checkedCount === 0;
        }
      }

      function syncSelectAllState() {
        var head = table.querySelector('thead .cell-checkbox');
        if (!head) {
          syncSelectionStatus();
          return;
        }
        var items = table.querySelectorAll('tbody .cell-checkbox');
        if (!items || items.length === 0) {
          head.checked = false;
          head.indeterminate = false;
          syncSelectionStatus();
          return;
        }
        var checked = 0;
        items.forEach(function(item) {
          if (item.checked) {
            checked += 1;
          }
        });
        head.checked = checked === items.length;
        head.indeterminate = checked > 0 && checked < items.length;
        syncSelectionStatus();
      }

      function refreshMultiselectState() {
        syncSelectAllState();
      }

      if (toggle) {
        toggle.addEventListener('click', function(event) {
          var enabled = !wrap.classList.contains('is-multiselect');
          wrap.classList.toggle('is-multiselect', enabled);
          toggle.setAttribute('aria-pressed', enabled ? 'true' : 'false');
          event.preventDefault();
        });
      }

      table.addEventListener('change', function(event) {
        var selectAll = event.target.closest('thead .cell-checkbox');
        if (selectAll) {
          var items = table.querySelectorAll('tbody .cell-checkbox');
          items.forEach(function(item) {
            item.checked = selectAll.checked;
          });
          syncSelectAllState();
          return;
        }

        var rowCheckbox = event.target.closest('tbody .cell-checkbox');
        if (rowCheckbox) {
          syncSelectAllState();
        }
      });

      bindBatchAction(batchDelete, {
        apiURL: batchDeleteAPI,
        fallback: batchDeleteAPI ? null : performLegacyBatchDelete,
        confirmMessage: function(rows) {
          return '确认批量删除选中的 ' + rows.length + ' 项？';
        },
        successIDsKey: 'deleted_ids',
        failedCountKey: 'failed_count',
        failedItemsKey: 'failed',
        buildMessage: buildBatchDeleteMessage,
        logLabel: 'api batch delete failed',
        title: '批量删除',
        doneEventName: 'dash:batch-delete:done',
      });

      bindBatchAction(batchRestore, {
        apiURL: batchRestoreAPI,
        successIDsKey: 'restored_ids',
        failedCountKey: 'failed_count',
        buildMessage: buildBatchRestoreMessage,
        logLabel: 'api batch restore failed',
        title: '批量恢复',
        doneEventName: 'dash:batch-restore:done',
      });

      document.addEventListener('dash:multiselect:refresh', function(event) {
        var detail = event && event.detail ? event.detail : {};
        if (detail.tableId && detail.tableId !== tableId) {
          return;
        }
        refreshMultiselectState();
      });

      syncSelectAllState();
    }

    var boundTableIDs = {};
    multiselectToggles.forEach(function(toggle) {
      var tableID = toggle.getAttribute('data-target-table');
      if (!tableID || boundTableIDs[tableID]) {
        return;
      }
      boundTableIDs[tableID] = true;
      bindTableMultiselect(tableID);
    });
  })();
</script>
