<!doctype html>
<html lang="{{ Settings('language') }}" data-route="{{ RouteName }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ Title }}</title>
  {% include "inc_meta.html" %}
  {% include "include/favicon.html" %}

  <link rel="stylesheet" href="/static/site/tufte-css/tufte.min.css">
  <link rel="stylesheet" href="/static/site/style.css">
  <script src="/static/site/main.js"></script>

  {% if Settings("ga4_id") %}
    {% include "inc_ga.html" %}
  {% endif %}
  {% block head_extra %}{% endblock %}
</head>
<body{% if IsMobile %} class="is-mobile"{% endif %}>
  <main>
      {% block content %}{% endblock %}
  </main>

  <footer>
    <p>
      <small>{{ (Settings("site_copyright") or "@copyright " ~ Settings("author")) | datetimeReplacer }}</small>
    </p>
  </footer>
</body>
</html>
