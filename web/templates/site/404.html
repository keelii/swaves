<header>
  <h1>404</h1>
  {{ template "site/includes/nav" . }}
</header>

<article>
  <p>页面不存在，可能已被删除或地址写错了。</p>
  <p>
    <a href="{{ .ReturnURL }}">返回来源页</a>
    /
    <a href="{{ GetBasePath }}">返回首页</a>
  </p>
  <p><small>returnUrl: {{ .ReturnURL }}</small></p>
  {{ if .ReqID }}<p><small>reqId: {{ .ReqID }}</small></p>{{ end }}
</article>
