<header>
  <h1>{{ settings "site_title" }}</h1>
  {{ template "site/includes/nav" . }}
</header>

<ul class="articles">
  {{ range .Articles }}
  <li>
    <a href="{{ .PermLink }}">{{ .Title }}</a>
    <span class="published">{{ relativeTime .PublishedAt }}</span>
  </li>
  {{ else }}
  <li>No posts</li>
  {{ end }}
</ul>

{{template "site/includes/pagination" .}}
