<h1>Encrypted Posts</h1>

<p>
  <a href="/admin/encrypted-posts/new">New Encrypted Post</a>
</p>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Slug</th>
    <th>Expires At</th>
    <th>Actions</th>
  </tr>
  </thead>

  <tbody>
  {{ range .Posts }}
  <tr>
    <td>{{ .ID }}</td>
    <td>{{ .Title }}</td>
    <td>{{ .Slug }}</td>
    <td>{{ if .ExpiresAt }}{{ .ExpiresAt }}{{ else }}Never{{ end }}</td>
    <td>
      <a href="/admin/encrypted-posts/{{ .ID }}/edit">Edit</a>

      <form method="post" style="display:inline" action="/admin/encrypted-posts/{{ .ID }}/delete">
        <button type="submit">Delete</button>
      </form>
    </td>
  </tr>
  {{ else }}
  <tr>
    <td colspan="5">No encrypted posts</td>
  </tr>
  {{ end }}
  </tbody>

  <tfoot>
  <tr>
    <td colspan="5">
      {{template "partials/pagination" .}}
    </td>
  </tr>
  </tfoot>
</table>
