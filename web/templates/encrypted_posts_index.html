<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>标题</th>
    <th>别名</th>
    <th>过期时间</th>
    <th>创建时间</th>
    <th>更新时间</th>
    <th>操作</th>
  </tr>
  </thead>

  <tbody>
  {{ range .Posts }}
  <tr>
    <td>{{ .ID }}</td>
    <td>{{ .Title }}</td>
    <td>{{ .Slug }}</td>
    <td>{{ if .ExpiresAt }}{{ formatTime .ExpiresAt }}{{ else }}Never{{ end }}</td>
    <td>{{ formatTime .CreatedAt }}</td>
    <td>{{ formatTime .UpdatedAt }}</td>
    <td>
      <a href="/admin/encrypted-posts/{{ .ID }}/edit">Edit</a>

      <form id="form" method="post" style="display:inline" action="/admin/encrypted-posts/{{ .ID }}/delete">
        <button type="submit">Delete</button>
      </form>
    </td>
  </tr>
  {{ else }}
  <tr>
    <td colspan="7">No encrypted posts</td>
  </tr>
  {{ end }}
  </tbody>

  <tfoot>
  <tr>
    <td colspan="7">
      {{template "partials/pagination" .}}
    </td>
  </tr>
  </tfoot>
</table>
