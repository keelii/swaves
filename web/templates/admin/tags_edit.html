{% extends "/admin/layout/layout" %}
{% block content %}
{% from "/admin/macro/ui" import form_field_text %}
<form id="form" method="post" action="{{ url_for("admin.tags.update", (dict("id", Tag.ID))) }}">

  {{ form_field_text("名称", "name", Tag.Name, required=true, placeholder="标签名称") }}
  {{ form_field_text("URL 标识", "slug", Tag.Slug, required=true, placeholder="url标识") }}

</form>
{% endblock %}
