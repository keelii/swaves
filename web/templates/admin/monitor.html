<style>
  .monitor-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    justify-content: space-between;
    align-items: center;
  }

  .monitor-tabs {
    display: inline-flex;
    gap: var(--space-1);
    flex-wrap: wrap;
  }

  .monitor-tabs a[role="tab"] {
    text-decoration: none;
  }

  .monitor-card-label {
    color: var(--muted-foreground);
    font-size: var(--text-8);
    margin-bottom: var(--space-1);
  }

  .monitor-card-value {
    font-size: var(--text-3);
    font-weight: var(--font-semibold);
    line-height: 1.1;
  }

  .monitor-card-sub {
    color: var(--muted-foreground);
    font-size: var(--text-9);
    margin-top: var(--space-1);
  }

  .monitor-chart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-3);
    gap: var(--space-2);
  }

  .monitor-chart-title {
    font-size: var(--text-6);
    font-weight: var(--font-semibold);
  }

  .monitor-chart-meta {
    color: var(--muted-foreground);
    font-size: var(--text-8);
  }

  .monitor-chart-wrap {
    min-height: 220px;
  }

  .monitor-chart-wrap svg {
    width: 100%;
    height: 220px;
    display: block;
  }

  .monitor-error {
    color: var(--danger);
    font-size: var(--text-8);
  }
</style>

<div class="card mb-4">
  <div class="monitor-toolbar">
    <div>
      <div class="monitor-card-label">时间粒度</div>
      <nav class="monitor-tabs" role="tablist" aria-label="时间粒度" data-monitor-granularity-tabs>
        {{ range .Granularities }}
          <a
            role="tab"
            aria-selected="{{ if eq $.ActiveGranularity .Key }}true{{ else }}false{{ end }}"
            href="{{ url_for "admin.monitor" (dict "granularity" .Key "metric" $.ActiveMetric) }}"
            data-monitor-granularity="{{ .Key }}"
          >{{ .Label }}</a>
        {{ end }}
      </nav>
    </div>
    <div>
      <div class="monitor-card-label">监控指标</div>
      <nav class="monitor-tabs" role="tablist" aria-label="监控指标" data-monitor-metric-tabs>
        {{ range .Metrics }}
          <a
            role="tab"
            aria-selected="{{ if eq $.ActiveMetric .Key }}true{{ else }}false{{ end }}"
            href="{{ url_for "admin.monitor" (dict "granularity" $.ActiveGranularity "metric" .Key) }}"
            data-monitor-metric="{{ .Key }}"
          >{{ .Label }}</a>
        {{ end }}
      </nav>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">应用 CPU</div>
      <div class="monitor-card-value" data-latest="pid_cpu">-</div>
      <div class="monitor-card-sub">进程占用</div>
    </div>
  </div>
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">应用内存</div>
      <div class="monitor-card-value" data-latest="pid_ram">-</div>
      <div class="monitor-card-sub">RSS</div>
    </div>
  </div>
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">应用连接数</div>
      <div class="monitor-card-value" data-latest="pid_conns">-</div>
      <div class="monitor-card-sub">TCP</div>
    </div>
  </div>
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">系统 CPU</div>
      <div class="monitor-card-value" data-latest="os_cpu">-</div>
      <div class="monitor-card-sub">全局负载</div>
    </div>
  </div>
</div>
<div class="row">
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">系统内存</div>
      <div class="monitor-card-value" data-latest="os_ram">-</div>
      <div class="monitor-card-sub">已用 / 总量</div>
    </div>
  </div>
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">系统负载</div>
      <div class="monitor-card-value" data-latest="os_load">-</div>
      <div class="monitor-card-sub">1分钟</div>
    </div>
  </div>
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">系统连接数</div>
      <div class="monitor-card-value" data-latest="os_conns">-</div>
      <div class="monitor-card-sub">TCP</div>
    </div>
  </div>
  <div class="col-3 mb-2">
    <div class="card">
      <div class="monitor-card-label">最近刷新</div>
      <div class="monitor-card-value" data-latest="ts">-</div>
      <div class="monitor-card-sub">采样时间</div>
    </div>
  </div>
</div>

<div class="card mt-4">
  <div class="monitor-chart-head">
    <div class="monitor-chart-title" data-monitor-metric-label>监控趋势</div>
    <div class="monitor-chart-meta" data-monitor-range>-</div>
  </div>
  <div class="monitor-chart-wrap" data-monitor-chart>
    <p class="text-lighter">正在加载图表...</p>
  </div>
  <div class="monitor-error" data-monitor-error hidden></div>
</div>

<script>
  (function() {
    var monitorAPIURL = '{{ url_for "admin.monitor.data" }}';
    var metricsAPIURL = '{{ url_for "admin.metrics.api" }}';

    var activeGranularity = '{{ .ActiveGranularity }}' || '1m';
    var activeMetric = '{{ .ActiveMetric }}' || 'pid_cpu';

    var chartEl = document.querySelector('[data-monitor-chart]');
    var rangeEl = document.querySelector('[data-monitor-range]');
    var metricLabelEl = document.querySelector('[data-monitor-metric-label]');
    var errorEl = document.querySelector('[data-monitor-error]');

    var latestTimer = null;
    var loadingHistory = false;

    function formatPercent(value) {
      var num = Number(value || 0);
      return num.toFixed(2) + '%';
    }

    function formatNumber(value) {
      var num = Number(value || 0);
      if (!Number.isFinite(num)) {
        return '-';
      }
      return String(Math.round(num));
    }

    function formatBytes(value) {
      var num = Number(value || 0);
      if (!Number.isFinite(num) || num < 0) {
        return '-';
      }
      if (num < 1024) {
        return Math.round(num) + ' B';
      }
      var units = ['KB', 'MB', 'GB', 'TB'];
      var idx = -1;
      while (num >= 1024 && idx < units.length - 1) {
        num /= 1024;
        idx += 1;
      }
      var text = num.toFixed(2).replace(/\.0+$/, '').replace(/(\.\d*[1-9])0+$/, '$1');
      return text + ' ' + units[idx];
    }

    function formatDateTime(ts) {
      var n = Number(ts || 0);
      if (!Number.isFinite(n) || n <= 0) {
        return '-';
      }
      var d = new Date(n * 1000);
      var pad = function(v) { return String(v).padStart(2, '0'); };
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    function setTabState(attrName, activeValue) {
      document.querySelectorAll('[' + attrName + ']').forEach(function(tab) {
        tab.setAttribute('aria-selected', tab.getAttribute(attrName) === activeValue ? 'true' : 'false');
      });
    }

    function renderError(message) {
      if (!errorEl) {
        return;
      }
      if (!message) {
        errorEl.hidden = true;
        errorEl.textContent = '';
        return;
      }
      errorEl.hidden = false;
      errorEl.textContent = message;
    }

    function renderLatest(latest) {
      if (!latest) {
        return;
      }

      var pid = latest.pid || {};
      var os = latest.os || {};

      setText('[data-latest="pid_cpu"]', formatPercent(pid.cpu));
      setText('[data-latest="pid_ram"]', formatBytes(pid.ram));
      setText('[data-latest="pid_conns"]', formatNumber(pid.conns));

      setText('[data-latest="os_cpu"]', formatPercent(os.cpu));
      setText('[data-latest="os_ram"]', formatBytes(os.ram) + ' / ' + formatBytes(os.total_ram));
      setText('[data-latest="os_load"]', Number(os.load_avg || 0).toFixed(3));
      setText('[data-latest="os_conns"]', formatNumber(os.conns));
      setText('[data-latest="ts"]', formatDateTime(latest.ts));
    }

    function buildURL(baseURL, params) {
      var url = new URL(baseURL, window.location.origin);
      Object.keys(params).forEach(function(key) {
        var value = params[key];
        if (value == null || value === '') {
          return;
        }
        url.searchParams.set(key, String(value));
      });
      return url;
    }

    function updateLocation() {
      var nextURL = buildURL('{{ url_for "admin.monitor" }}', {
        granularity: activeGranularity,
        metric: activeMetric,
      });
      history.replaceState(null, '', nextURL.pathname + nextURL.search);
    }

    async function loadMonitorHistory() {
      if (loadingHistory) {
        return;
      }
      loadingHistory = true;
      renderError('');

      try {
        var url = buildURL(monitorAPIURL, {
          granularity: activeGranularity,
          metric: activeMetric,
        });
        var response = await fetch(url.toString(), {
          headers: {
            'Accept': 'application/json'
          }
        });
        var json = await response.json().catch(function() {
          return {};
        });

        if (!response.ok || !json.ok) {
          throw new Error(json.error || '读取监控数据失败');
        }

        if (chartEl) {
          chartEl.innerHTML = json.chart_svg || '<p class="text-lighter">暂无图表数据</p>';
        }

        if (metricLabelEl && json.metric && json.metric.label) {
          metricLabelEl.textContent = json.metric.label + ' 趋势';
        }

        if (rangeEl) {
          rangeEl.textContent = formatDateTime(json.start_at) + ' - ' + formatDateTime(json.end_at);
        }

        renderLatest(json.latest || null);
      } catch (err) {
        var msg = err && err.message ? err.message : '读取监控数据失败';
        renderError(msg);
        if (chartEl) {
          chartEl.innerHTML = '<p class="text-lighter">加载失败</p>';
        }
        notify(msg, '监控数据', { variant: 'danger' });
      } finally {
        loadingHistory = false;
      }
    }

    async function refreshLatestOnly() {
      try {
        var response = await fetch(metricsAPIURL, {
          headers: {
            'Accept': 'application/json'
          }
        });
        var json = await response.json().catch(function() {
          return {};
        });
        if (!response.ok || !json.pid || !json.os) {
          return;
        }
        renderLatest(json);
      } catch (_) {
      }
    }

    function bindTabEvents() {
      document.querySelectorAll('[data-monitor-granularity]').forEach(function(tab) {
        tab.addEventListener('click', function(event) {
          event.preventDefault();
          var next = tab.getAttribute('data-monitor-granularity') || '';
          if (!next || next === activeGranularity) {
            return;
          }
          activeGranularity = next;
          setTabState('data-monitor-granularity', activeGranularity);
          updateLocation();
          loadMonitorHistory();
        });
      });

      document.querySelectorAll('[data-monitor-metric]').forEach(function(tab) {
        tab.addEventListener('click', function(event) {
          event.preventDefault();
          var next = tab.getAttribute('data-monitor-metric') || '';
          if (!next || next === activeMetric) {
            return;
          }
          activeMetric = next;
          setTabState('data-monitor-metric', activeMetric);
          updateLocation();
          loadMonitorHistory();
        });
      });
    }

    function startLatestTicker() {
      if (latestTimer) {
        clearInterval(latestTimer);
      }
      latestTimer = setInterval(refreshLatestOnly, 3000);
    }

    bindTabEvents();
    setTabState('data-monitor-granularity', activeGranularity);
    setTabState('data-monitor-metric', activeMetric);
    loadMonitorHistory();
    startLatestTicker();
  })();
</script>
