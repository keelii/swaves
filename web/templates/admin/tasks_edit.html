{% extends "admin/layout/layout.html" %}
{% block content %}

<form id="form" method="post" action="{{ url_for('admin.tasks.update', id=Task.ID) }}">
  <div class="row">
    <div class="col-6">
      <label data-field>
        是否启用
        {{ ui.toggle(printf("task_enabled_%d", Task.ID), "enabled", checked=(Task.Enabled == 1), data_labels="禁用,启用", data_on_value="1", data_off_value="0") }}
      </label>

      <fieldset>
        <legend>任务类型</legend>
        <label>
          <input type="radio" name="kind" value="0"{% if Task.Kind == 0 %} checked{% endif %}>
          内部任务（不生成运行记录）
        </label>
        <label>
          <input type="radio" name="kind" value="1"{% if Task.Kind == 1 %} checked{% endif %}>
          用户任务（生成运行记录）
        </label>
        <p>
          <small>内部任务执行时不写入任务运行记录表（TaskRun）</small>
        </p>
      </fieldset>

      <label data-field>
        任务名称
        <input type="text" name="name" required value="{{ Task.Name }}" placeholder="任务名称">
      </label>

      <label data-field>
        任务编码
        <input type="text" value="{{ Task.Code }}" disabled>
        <input type="hidden" name="code" value="{{ Task.Code }}">
      </label>

      <label data-field>
        执行频率
        <select id="schedule-preset">
          <option value="@hourly"{% if Task.Schedule == "@hourly" %} selected{% endif %}>每小时</option>
          <option value="@daily"{% if Task.Schedule == "@daily" %} selected{% endif %}>每天</option>
          <option value="@weekly"{% if Task.Schedule == "@weekly" %} selected{% endif %}>每周</option>
          <option value="@monthly"{% if Task.Schedule == "@monthly" %} selected{% endif %}>每月</option>
          <option value="@yearly"{% if Task.Schedule == "@yearly" %} selected{% endif %}>每年</option>
          <option value="__custom__"{% if not (Task.Schedule == "@hourly") or (Task.Schedule == "@daily") or (Task.Schedule == "@weekly") or (Task.Schedule == "@monthly") or (Task.Schedule == "@yearly") %} selected{% endif %}>自定义</option>
        </select>
        <small>选择任务执行频率，或切换为自定义 Cron 表达式。</small>
      </label>

      <label data-field id="schedule-custom-wrap" hidden>
        自定义 Cron 表达式
        <input type="text" id="schedule-custom" placeholder="例如: 0 */5 * * *" value="{{ Task.Schedule }}">
      </label>
      <input type="hidden" name="schedule" id="schedule-value" value="{{ Task.Schedule }}">

      <label data-field>
        任务描述
        <textarea name="description" rows="3" cols="60" placeholder="任务描述">{{ Task.Description }}</textarea>
      </label>
    </div>
  </div>
</form>

<script>
$(function() {
  var $preset = $('#schedule-preset');
  var $wrap = $('#schedule-custom-wrap');
  var $custom = $('#schedule-custom');
  var $val = $('#schedule-value');

  function sync() {
    $val.val($preset.val() === '__custom__' ? $custom.val() : $preset.val());
  }

  function ui.toggle() {
    var isCustom = $preset.val() === '__custom__';
    $wrap.prop('hidden', !isCustom);
    sync();
  }

  ui.toggle();

  $preset.on('change', function() {
    ui.toggle();
    if ($preset.val() === '__custom__') {
      $custom.focus();
    }
  });

  $custom.on('input change', sync);

  $('#form').on('submit', function(e) {
    if ($preset.val() === '__custom__' && !$custom.val().trim()) {
      e.preventDefault();
      $custom.focus();
      return false;
    }
    sync();
  });
});
</script>
{% endblock %}
