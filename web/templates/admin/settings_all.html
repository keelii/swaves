<style>
  .settings-kind {
    margin-bottom: var(--space-8);
  }

  .settings-item-radio {
    align-self: center;
  }
</style>

<form id="form" method="post" action="/admin/settings/all" class="settings-all-form">
  {{ range .SettingKinds }}
    {{ $kind := . }}
    <section class="settings-kind">
      <h2 class="settings-kind-title">{{ $kind }}</h2>
      <div class="row">
        {{ range index $.SettingsByKind $kind }}
          {{ $setting := . }}
          {{ $code := $setting.Code }}
          {{ $attrs := $setting.AttrsParsed }}
          <div class="col-4 settings-item{{ if eq $setting.Type "textarea" }} settings-item-full{{ end }}{{ if eq $setting.Type "radio" }} settings-item-radio{{ end }}">
            <label class="settings-item-label">

              {{ if ne $setting.Type "radio" }}
                <div class="settings-item-header">
                  <span class="settings-item-title">{{ $setting.Name }}</span>
                </div>
              {{ end }}

              {{ if eq $setting.Type "text" }}
                <input autocomplete="off" type="text" name="setting_{{ $code }}" value="{{ $setting.Value }}"{{ renderAttrs $attrs }}>
              {{ else if eq $setting.Type "number" }}
                <input type="number" name="setting_{{ $code }}" value="{{ $setting.Value }}"{{ renderAttrs $attrs }}>
              {{ else if eq $setting.Type "date" }}
                <input type="date" name="setting_{{ $code }}" value="{{ $setting.Value }}"{{ renderAttrs $attrs }}>
              {{ else if eq $setting.Type "time" }}
                <input type="time" name="setting_{{ $code }}" value="{{ $setting.Value }}"{{ renderAttrs $attrs }}>
              {{ else if eq $setting.Type "datetime" }}
                <input type="datetime-local" name="setting_{{ $code }}" value="{{ $setting.Value }}"{{ renderAttrs $attrs }}>
              {{ else if eq $setting.Type "url" }}
                <input type="url" name="setting_{{ $code }}" value="{{ $setting.Value }}"{{ renderAttrs $attrs }}>
              {{ else if eq $setting.Type "range" }}
                <span class="settings-range-wrap">
                  <input type="range" id="setting_{{ $code }}_range" name="setting_{{ $code }}" value="{{ $setting.Value }}"{{ renderAttrs $attrs }} data-range-value{{ if eq $code "font_size" }} data-unit=" px"{{ end }}>
                  <output class="range-value" for="setting_{{ $code }}_range">{{ $setting.Value }}{{ if eq $code "font_size" }} px{{ end }}</output>
                </span>
              {{ else if eq $setting.Type "password" }}
                <input type="password" name="setting_{{ $code }}" placeholder="Leave empty to keep current"{{ renderAttrs $attrs }}>
              {{ else if eq $setting.Type "textarea" }}
                <textarea name="setting_{{ $code }}"{{ renderAttrs $attrs }}>{{ $setting.Value }}</textarea>
              {{ else if eq $setting.Type "radio" }}
                {{ $currentValue := or $setting.Value $setting.DefaultOptionValue }}
                <fieldset class="settings-options hstack">
                  <legend>{{ $setting.Name }}</legend>
                  {{ range $setting.OptionsParsed }}
                  <input type="radio" name="setting_{{ $code }}" value="{{ .value }}" {{ if eq $currentValue .value }}checked{{ end }}{{ renderAttrs $attrs }}>
                  <span>{{ .label }}</span>
                  {{ end }}
                </fieldset>
              {{ else if eq $setting.Type "checkbox" }}
                <div class="settings-options">
                  {{ range $setting.OptionsParsed }}
                    <label class="settings-option">
                      <input type="checkbox" name="setting_{{ $code }}" value="{{ .value }}" {{ if index $setting.CheckboxValues .value }}checked{{ end }}{{ renderAttrs $attrs }}>
                      <span>{{ .label }}</span>
                    </label>
                  {{ end }}
                </div>
              {{ else if eq $setting.Type "select" }}
                {{ $currentValue := or $setting.Value $setting.DefaultOptionValue }}
                <select name="setting_{{ $code }}"{{ renderAttrs $attrs }}>
                  {{ range $setting.OptionsParsed }}
                    <option value="{{ .value }}" {{ if eq $currentValue .value }}selected{{ end }}>{{ .label }}</option>
                  {{ end }}
                </select>
              {{ end }}
            </label>
          </div>
        {{ end }}
      </div>
    </section>
  {{ end }}
</form>

<script>
$(function() {
  $('input[data-range-value]').each(function() {
    var $in = $(this), $out = $in.next('.range-value');
    if (!$out.length) return;
    function update() { $out.text($in.val() + ($in.data('unit') || '')); }
    $in.on('input change', update);
    update();
  });
});
</script>
