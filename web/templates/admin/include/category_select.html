{% set selectName = SelectName|default("categories") %}
{% set selectID = SelectID|default("categories-select") %}
{% if Root.CategoryOptions %}
  {% set options = Root.CategoryOptions %}
{% else %}
  {% set options = Root.Categories %}
{% endif %}
<select name="{{ selectName }}"{% if selectID %} id="{{ selectID }}"{% endif %}>
  {% if EmptyOption %}
    <option value="">{{ EmptyOption }}</option>
  {% else %}
    <option value="">顶级分类</option>
  {% endif %}
  {% for category in options %}
    <option value="{{ category.ID }}" {% if SelectedID|default(0) == category.ID %}selected{% endif %}>{{ category.DisplayName|default(category.Name) }}</option>
  {% endfor %}
</select>
