<form id="form" method="post" action="{{ url_for("admin.settings.create") }}">

  <p>
    <label>
      分类<br>
      <input type="text" name="kind" value="{% if Setting %}{{ Setting.Kind }}{% else %}default{% endif %}" required placeholder="例如: system, url, integration, default">
      <small>（例如：system、url、integration、default）</small>
    </label>
  </p>

  <p>
    <label>
      子分类<br>
      <input type="text" name="sub_kind" value="{% if Setting %}{{ Setting.SubKind }}{% endif %}" placeholder="例如: general, see, imagekit, s3">
      <small>（可选，分类下的子分类 code）</small>
    </label>
  </p>

  <p>
    <label>
      名称<br>
      <input type="text" name="name" value="{% if Setting %}{{ Setting.Name }}{% endif %}" required placeholder="人类可读的名称">
      <small>（用于界面展示的人类可读名称）</small>
    </label>
  </p>

  <p>
    <label>
      编码<br>
      <input type="text" name="code" value="{% if Setting %}{{ Setting.Code }}{% endif %}" required placeholder="例如: site_name, admin_password">
      <small>（唯一键，例如：site_name、admin_password）</small>
    </label>
  </p>

  <p>
    <label>
      类型<br>
      <select name="type" required>
        <option value="text" {% if (Setting and (((Setting.Type == "text")))) %}selected{% endif %}>文本</option>
        <option value="number" {% if (Setting and (((Setting.Type == "number")))) %}selected{% endif %}>数字</option>
        <option value="date" {% if (Setting and (((Setting.Type == "date")))) %}selected{% endif %}>日期</option>
        <option value="time" {% if (Setting and (((Setting.Type == "time")))) %}selected{% endif %}>时间</option>
        <option value="datetime" {% if (Setting and (((Setting.Type == "datetime")))) %}selected{% endif %}>日期时间</option>
        <option value="url" {% if (Setting and (((Setting.Type == "url")))) %}selected{% endif %}>URL</option>
        <option value="range" {% if (Setting and (((Setting.Type == "range")))) %}selected{% endif %}>范围滑块</option>
        <option value="password" {% if (Setting and (((Setting.Type == "password")))) %}selected{% endif %}>密码</option>
        <option value="secret" {% if (Setting and (((Setting.Type == "secret")))) %}selected{% endif %}>密钥</option>
        <option value="radio" {% if (Setting and (((Setting.Type == "radio")))) %}selected{% endif %}>单选</option>
        <option value="checkbox" {% if (Setting and (((Setting.Type == "checkbox")))) %}selected{% endif %}>复选</option>
        <option value="select" {% if (Setting and (((Setting.Type == "select")))) %}selected{% endif %}>下拉</option>
        <option value="prefix-field" {% if (Setting and (((Setting.Type == "prefix-field")))) %}selected{% endif %}>前缀字段</option>
        <option value="textarea" {% if (Setting and (((Setting.Type == "textarea")))) %}selected{% endif %}>多行文本</option>
      </select>
    </label>
  </p>

  <p>
    <label>
      选项（JSON）<br>
      <textarea name="options" rows="3" cols="80" placeholder='[{"label": "选项1", "value": "value1"}, {"label": "选项2", "value": "value2"}]'>{% if Setting %}{{ Setting.Options }}{% endif %}</textarea>
      <small>（单选/复选/下拉类型必填，格式为 {label, value} 的 JSON 数组）</small>
    </label>
  </p>

  <p>
    <label>
      属性（JSON）<br>
      <textarea name="attrs" rows="3" cols="80" placeholder='{"min": 0, "max": 100, "step": 1}'>{% if Setting %}{{ Setting.Attrs }}{% endif %}</textarea>
      <small>（可选 HTML 属性，JSON 对象）</small>
    </label>
  </p>

  <p>
    <label>
      默认选项值<br>
      <div id="default_option_value_container">
        {% if OptionsParsed %}
          <select name="default_option_value" id="default_option_value">
            <option value="">顶级分类</option>
            {% for option in OptionsParsed %}
              <option value="{{ option.value }}" {% if ((__root.DefaultOptionValue == option.value)) %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
          <small>（从上方选项中选择默认值；选项变更后会自动更新）</small>
        {% else %}
          <input type="text" name="default_option_value" id="default_option_value" value="{% if Setting %}{{ Setting.DefaultOptionValue }}{% else %}{{ DefaultOptionValue }}{% endif %}" placeholder="默认值">
          <small>（当配置下拉/单选/复选时使用；不需要可留空，填写上方选项后会显示下拉）</small>
        {% endif %}
      </div>
    </label>
  </p>

  <p>
    <label>
      前缀值<br>
      <input type="text" name="prefix_value" value="{% if Setting %}{{ Setting.PrefixValue }}{% endif %}" placeholder="如：/、blog（前缀字段类型使用）">
      <small>（可选，前缀字段类型使用）</small>
    </label>
  </p>

  <p>
    <label>
      值<br>
      <span class="hstack">
        <input id="setting_new_value" type="text" name="value" value="{% if Setting %}{{ Setting.Value }}{% endif %}" placeholder="初始值" style="flex:1;">
        <button class="outline" type="button" id="toggle_setting_new_value" style="display:none;">显示</button>
      </span>
      <small>（初始值，设置创建时写入）</small>
    </label>
  </p>

  <p>
    <label>
      描述<br>
      <textarea name="description" rows="2" cols="80" placeholder="帮助文本，显示在管理界面中">{% if Setting %}{{ Setting.Description }}{% endif %}</textarea>
      <small>（显示在管理界面的帮助说明）</small>
    </label>
  </p>

  <p>
    <label>
      排序<br>
      <input type="number" name="sort" value="{% if Setting %}{{ Setting.Sort }}{% else %}0{% endif %}">
      <small>（分类内排序，越小越靠前）</small>
    </label>
  </p>

  <p>
    <label>
      <input type="checkbox" name="reload" value="1"{% if Setting %}{% if ((Setting.Reload == 1)) %} checked{% endif %}{% endif %}>
      修改后需重启生效
    </label>
  </p>

</form>

<script>
$(function() {
  var $type = $('select[name="type"]');
  var $valueInput = $('#setting_new_value');
  var $toggleValue = $('#toggle_setting_new_value');
  var $opt = $('textarea[name="options"]'), $cont = $('#default_option_value_container');
  function updateDefaultOptionValue() {
    if (!$opt.length || !$cont.length) {
      return;
    }

    var currentVal = $('#default_option_value').val() || '';
    var text = $opt.val().trim();
    try {
      if (text) {
        var opts = JSON.parse(text);
        if (Array.isArray(opts) && opts.length > 0) {
          var html = '<select name="default_option_value" id="default_option_value"><option value="">顶级分类</option>';
          opts.forEach(function(o) {
            var v = o.value || '', l = o.label || v;
            html += '<option value="' + v + '"' + (v === currentVal ? ' selected' : '') + '>' + l + '</option>';
          });
          html += '</select><small>（从上方选项中选择默认值）</small>';
          $cont.html(html);
          return;
        }
      }
    } catch (e) {}
    $cont.html('<input type="text" name="default_option_value" id="default_option_value" value="' + (currentVal || '') + '"><small>（默认值；填写合法的选项 JSON 后可显示下拉）</small>');
  }
  if ($opt.length && $cont.length) {
    $opt.on('input', updateDefaultOptionValue);
    if ($opt.val().trim()) {
      updateDefaultOptionValue();
    }
  }

  function syncValueMask() {
    var currentType = ($type.val() || '').toLowerCase();
    var shouldMask = currentType === 'password' || currentType === 'secret';
    $valueInput.attr('type', shouldMask ? 'password' : 'text');
    $toggleValue.toggle(shouldMask);
    if (!shouldMask) {
      $toggleValue.text('显示');
    }
  }

  $type.on('change', syncValueMask);
  $toggleValue.on('click', function() {
    var isPassword = ($valueInput.attr('type') || '').toLowerCase() === 'password';
    if (isPassword) {
      $valueInput.attr('type', 'text');
      $toggleValue.text('隐藏');
    } else {
      $valueInput.attr('type', 'password');
      $toggleValue.text('显示');
    }
  });

  syncValueMask();
});
</script>
