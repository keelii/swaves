<form id="form" method="post" action="/admin/settings/new">

  <p>
    <label>
      Kind<br>
      <input type="text" name="kind" value="{{ if .Setting }}{{ .Setting.Kind }}{{ else }}default{{ end }}" required placeholder="例如: system, url, integration, default">
      <small>(e.g., system, url, integration, default)</small>
    </label>
  </p>

  <p>
    <label>
      Name<br>
      <input type="text" name="name" value="{{ if .Setting }}{{ .Setting.Name }}{{ end }}" required placeholder="人类可读的名称">
      <small>(Human readable name)</small>
    </label>
  </p>

  <p>
    <label>
      Code<br>
      <input type="text" name="code" value="{{ if .Setting }}{{ .Setting.Code }}{{ end }}" required placeholder="例如: site_name, admin_password">
      <small>(Unique key, e.g., site_name, admin_password)</small>
    </label>
  </p>

  <p>
    <label>
      Type<br>
      <select name="type" required>
        <option value="text" {{ if and .Setting (eq .Setting.Type "text") }}selected{{ end }}>text</option>
        <option value="number" {{ if and .Setting (eq .Setting.Type "number") }}selected{{ end }}>number</option>
        <option value="date" {{ if and .Setting (eq .Setting.Type "date") }}selected{{ end }}>date</option>
        <option value="time" {{ if and .Setting (eq .Setting.Type "time") }}selected{{ end }}>time</option>
        <option value="datetime" {{ if and .Setting (eq .Setting.Type "datetime") }}selected{{ end }}>datetime</option>
        <option value="url" {{ if and .Setting (eq .Setting.Type "url") }}selected{{ end }}>url</option>
        <option value="range" {{ if and .Setting (eq .Setting.Type "range") }}selected{{ end }}>range</option>
        <option value="password" {{ if and .Setting (eq .Setting.Type "password") }}selected{{ end }}>password</option>
        <option value="radio" {{ if and .Setting (eq .Setting.Type "radio") }}selected{{ end }}>radio</option>
        <option value="checkbox" {{ if and .Setting (eq .Setting.Type "checkbox") }}selected{{ end }}>checkbox</option>
        <option value="select" {{ if and .Setting (eq .Setting.Type "select") }}selected{{ end }}>select</option>
        <option value="textarea" {{ if and .Setting (eq .Setting.Type "textarea") }}selected{{ end }}>textarea</option>
      </select>
    </label>
  </p>

  <p>
    <label>
      Options (JSON)<br>
      <textarea name="options" rows="3" cols="80" placeholder='[{"label": "Option 1", "value": "value1"}, {"label": "Option 2", "value": "value2"}]'>{{ if .Setting }}{{ .Setting.Options }}{{ end }}</textarea>
      <small>(Required for radio/checkbox/select type, JSON array of {label, value})</small>
    </label>
  </p>

  <p>
    <label>
      Attrs (JSON)<br>
      <textarea name="attrs" rows="3" cols="80" placeholder='{"min": 0, "max": 100, "step": 1}'>{{ if .Setting }}{{ .Setting.Attrs }}{{ end }}</textarea>
      <small>(Optional HTML attributes, JSON object)</small>
    </label>
  </p>

  <p>
    <label>
      Default Option Value<br>
      <div id="default_option_value_container">
        {{ if .OptionsParsed }}
          <select name="default_option_value" id="default_option_value">
            <option value="">顶级分类</option>
            {{ range .OptionsParsed }}
              <option value="{{ .value }}" {{ if eq $.DefaultOptionValue .value }}selected{{ end }}>{{ .label }}</option>
            {{ end }}
          </select>
          <small>(Select default value from options above. Updates automatically when Options is changed.)</small>
        {{ else }}
          <input type="text" name="default_option_value" id="default_option_value" value="{{ if .Setting }}{{ .Setting.DefaultOptionValue }}{{ else }}{{ .DefaultOptionValue }}{{ end }}" placeholder="默认值">
          <small>(Default value for select/radio/checkbox when options are provided. Leave empty if not using options. Fill in Options field above to see dropdown.)</small>
        {{ end }}
      </div>
    </label>
  </p>

  <p>
    <label>
      Value<br>
      <input type="text" name="value" value="{{ if .Setting }}{{ .Setting.Value }}{{ end }}" placeholder="初始值">
      <small>(Initial value - will be set when setting is created)</small>
    </label>
  </p>

  <p>
    <label>
      Description<br>
      <textarea name="description" rows="2" cols="80" placeholder="帮助文本，显示在管理界面中">{{ if .Setting }}{{ .Setting.Description }}{{ end }}</textarea>
      <small>(Help text shown in admin)</small>
    </label>
  </p>

  <p>
    <label>
      Sort<br>
      <input type="number" name="sort" value="{{ if .Setting }}{{ .Setting.Sort }}{{ else }}0{{ end }}">
      <small>(Sort order within kind)</small>
    </label>
  </p>

  <p>
    <label>
      <input type="checkbox" name="reload" value="1"{{ if .Setting }}{{ if eq .Setting.Reload 1 }} checked{{ end }}{{ end }}>
      修改后需重启生效 (Reload)
    </label>
  </p>

</form>

<script>
$(function() {
  var $opt = $('textarea[name="options"]'), $cont = $('#default_option_value_container');
  if (!$opt.length || !$cont.length) return;
  function update() {
    var currentVal = $('#default_option_value').val() || '';
    var text = $opt.val().trim();
    try {
      if (text) {
        var opts = JSON.parse(text);
        if (Array.isArray(opts) && opts.length > 0) {
          var html = '<select name="default_option_value" id="default_option_value"><option value="">顶级分类</option>';
          opts.forEach(function(o) {
            var v = o.value || '', l = o.label || v;
            html += '<option value="' + v + '"' + (v === currentVal ? ' selected' : '') + '>' + l + '</option>';
          });
          html += '</select><small>(Select default value from options above.)</small>';
          $cont.html(html);
          return;
        }
      }
    } catch (e) {}
    $cont.html('<input type="text" name="default_option_value" id="default_option_value" value="' + (currentVal || '') + '"><small>(Default value. Fill valid Options JSON to see dropdown.)</small>');
  }
  $opt.on('input', update);
  if ($opt.val().trim()) update();
});
</script>
