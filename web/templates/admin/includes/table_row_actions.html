{% import "/admin/includes/ui_macros" as ui %}

<td>
  <div class="row-actions">
    {{ ui.action_icon_link(dict("href", (url_for(EditRoute, (dict("id", ID)))), "name", "square-pen", "label", "编辑")) }}
    <form id="form" method="post" action="{{ url_for(DeleteRoute, (dict("id", ID))) }}">
      {{ ui.action_icon_button(dict("type", "submit", "name", "trash-2", "label", "删除", "danger", true)) }}
    </form>
  </div>
</td>
