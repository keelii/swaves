{{ $label := or .Label "Expires At" }}
{{ if .ReadOnly }}
<label data-field>
  {{ $label }}{{ if .LabelSuffix }} {{ .LabelSuffix }}{{ end }}
  {{ if .HasExpiry }}
  <span>{{ or .DisplayDate "—" }}</span>
  {{ else }}
  <span>Never</span>
  {{ end }}
</label>
{{ else }}
<fieldset data-field>
  <legend>{{ $label }}{{ if .LabelSuffix }} {{ .LabelSuffix }}{{ end }}</legend>
  <div class="hstack" style="flex-wrap: wrap;">
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="none"{{ if not .HasExpiry }} checked{{ end }}> Never</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="1min"> 1 minute</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="5min"> 5 minutes</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="1hour"> 1 hour</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="1day"> 1 day</label>
    <label class="hstack" style="margin: 0;"><input type="radio" name="expires_at_option" value="custom"{{ if .HasExpiry }} checked{{ end }}> Other</label>
  </div>
  <div id="custom-date-container" class="mt-2" style="display: {{ if .HasExpiry }}block{{ else }}none{{ end }};">
    <input class="w-100" type="datetime-local" name="expires_at_custom" id="expires_at_custom" value="{{ or .CustomDate "" }}">
  </div>
</fieldset>
<script>
$(function() {
  var $opt = $('input[name="expires_at_option"]'), $customWrap = $('#custom-date-container'), $custom = $('#expires_at_custom');
  function toggleCustomDate() {
    if ($opt.filter(':checked').val() === 'custom') {
      $customWrap.show();
    } else {
      $customWrap.hide();
      $custom.val('');
    }
  }
  $opt.on('change', toggleCustomDate);
  toggleCustomDate();
});
</script>
{{ end }}
