
<p>
  <label>
    {{ Label }}<br>
    <select name="{{ Name }}">
      {% for option in Options %}
        <option value="{{ option.Value }}"{% if ((Selected == option.Value)) %} selected{% endif %}>{{ option.Label }}</option>
      {% endfor %}
    </select>
    {% if Help %}<small>{{ Help }}</small>{% endif %}
  </label>
</p>
