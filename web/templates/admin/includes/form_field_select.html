{{/* 通用选择框字段
使用方式: {{ template "admin/includes/form_field_select" dict "Label" "状态" "Name" "status" "Options" (slice (dict "Value" "draft" "Label" "草稿") (dict "Value" "published" "Label" "已发布")) "Selected" .Post.Status }}
*/}}
<p>
  <label>
    {{ .Label }}<br>
    <select name="{{ .Name }}">
      {{ range .Options }}
        <option value="{{ .Value }}"{{ if eq $.Selected .Value }} selected{{ end }}>{{ .Label }}</option>
      {{ end }}
    </select>
    {{ if .Help }}<small>{{ .Help }}</small>{{ end }}
  </label>
</p>
