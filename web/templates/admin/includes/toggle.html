{% set labels = (DataLabels|default("禁用,启用"))|split(",") %}
{% set onVal = DataOnValue|default("published") %}
{% set offVal = DataOffValue|default("draft") %}
<span class="toggle-wrapper">
  <input type="checkbox" id="{{ ID }}"
         class="toggle-checkbox"{% if Checked|default(false) %} checked{% endif %}
         {% if ReadOnly|default(false) %} disabled{% endif %}
         data-on-value="{{ onVal }}" data-off-value="{{ offVal }}" />
  <label for="{{ ID }}" class="toggle-label"></label>
  <span class="toggle-text" data-off="{{ labels[0] }}" data-on="{{ labels[1] }}"></span>
</span>
{% if Name %}
<input type="hidden" name="{{ Name }}"
       value="{% if Checked|default(false) %}{{ onVal }}{% else %}{{ offVal }}{% endif %}"
       id="{{ ID }}_hidden" />
{% endif %}
