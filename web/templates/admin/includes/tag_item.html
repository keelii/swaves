{% import "/admin/includes/ui_macros" as ui %}
<span class="badge secondary">
  {% if (Tag|default(none) and KindQuery) %}
  <a href="{{ url_for("admin.posts.list") }}?kind={{ KindQuery }}{% if SearchQueryEscaped %}&q={{ SearchQueryEscaped }}{% endif %}{% if FilterCategoryIDStr %}&category={{ FilterCategoryIDStr }}{% endif %}&tag={{ Tag.ID }}">{{ Tag.Name }}</a>
  {% else %}
  {{ Label }}
  {% endif %}
  {% if RemoveHref %}
  <a href="{{ RemoveHref }}" class="tag-remove btn-icon" aria-label="删除">
    {{ ui.lucide_icon(dict("name", "x", "size", "14")) }}
  </a>
  {% endif %}
</span>
