<select name="categories" id="categories-select">
  {% if __root.EmptyOption %}
    <option value="">{{ __root.EmptyOption }}</option>
  {% else %}
    <option value="">顶级分类</option>
  {% endif %}
  {% for category in Root.Categories %}
    <option value="{{ category.ID }}" {% if (((__root.SelectedID|default(0)) == category.ID)) %}selected{% endif %}>{{ category.Name }}</option>
  {% endfor %}
</select>
