<form id="form" method="post" action="/admin/import/preview">

  <input type="hidden" name="items_count" value="{{ len .Items }}">

  <table>
    <thead>
    <tr>
       <th>标题/URL标识</th>
       <th>
         状态
         <button type="button" id="toggle-status-btn" style="margin-left: 8px; padding: 2px 8px; font-size: 12px;">切换</button>
       </th>
       <th>类型</th>
       <th>标签/分类</th>
       <th>内容</th>
    </tr>
    </thead>
    <tbody>
    {{ range .Items }}
    <tr>
      <td>
        <input type="text" name="items[{{ .Index }}][title]" value="{{ .Title }}" required style="width: 100%;">
        <input type="text" name="items[{{ .Index }}][slug]" value="{{ .Slug }}" required style="width: 100%;">
        <input type="hidden" name="items[{{ .Index }}][created_at_unix]" value="{{ .CreatedAtUnix }}">
        <input type="text" name="items[{{ .Index }}][created_at]" value="{{ .CreatedAt }}" placeholder="YYYY-MM-DD HH:MM:SS" style="width: 100%;">
      </td>
      <td>
        <label class="inline-flex items-center gap-2"><input type="radio" name="items[{{ .Index }}][status]" value="draft" {{ if eq .Status "draft" }}checked{{ end }}> draft</label>
        <label class="inline-flex items-center gap-2"><input type="radio" name="items[{{ .Index }}][status]" value="published" {{ if eq .Status "published" }}checked{{ end }}> published</label>
      </td>
      <td>
        <label class="inline-flex items-center gap-2"><input type="radio" name="items[{{ .Index }}][kind]" value="0" {{ if or (eq .Kind "0") (eq .Kind "") }}checked{{ end }}> post</label>
        <label class="inline-flex items-center gap-2"><input type="radio" name="items[{{ .Index }}][kind]" value="1" {{ if eq .Kind "1" }}checked{{ end }}> page</label>
      </td>
      <td>
        <input type="text" name="items[{{ .Index }}][tags]" value="{{ .Tags }}" placeholder="tag1, tag2" style="width: 100%;">
        <input type="text" name="items[{{ .Index }}][category]" value="{{ .Category }}" placeholder="category name" style="width: 100%;">
      </td>
      <td>
        <textarea name="items[{{ .Index }}][content]" rows="5" cols="150" style="width: 100%;">{{ .Content }}</textarea>
      </td>
    </tr>
    {{ end }}
    </tbody>
  </table>

</form>

<script>
$(function() {
  $('#toggle-status-btn').on('click', function() {
    var allDraft = true;
    $('tbody tr').each(function() {
      if ($(this).find('input[type="radio"][name*="[status]"]:checked').val() !== 'draft') allDraft = false;
    });
    var newVal = allDraft ? 'published' : 'draft';
    $('input[type="radio"][name*="[status]"][value="' + newVal + '"]').prop('checked', true);
  });
});
</script>
