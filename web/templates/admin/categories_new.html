{% extends "admin/layout/layout.html" %}
{% block content %}
<form id="form" method="post" action="{{ UrlFor('admin.categories.create') }}">
  <div class="row">
    <div class="col-6">
      <label data-field>
        父分类
        {% with Root = {"CategoryOptions": CategoryOptions}, SelectedID = ParentID|default(0), SelectName = "parent_id", SelectID = "parent-id-select", EmptyOption = "顶级分类" %}{% include "admin/include/category_select.html" %}{% endwith %}
        <small>（选择父分类，选择“顶级分类”表示无父级）</small>
      </label>

      <label data-field>
        名称
        <input type="text" name="name" required placeholder="分类名称">
        <small>（显示名称）</small>
      </label>

      <label data-field>
        URL 标识
        <input type="text" name="slug" required placeholder="url标识">
        <small>（URL 标识，同级下需唯一）</small>
      </label>

      <label data-field>
        Description
        <textarea name="description" rows="3" cols="80" placeholder="可选描述信息"></textarea>
        <small>（可选描述）</small>
      </label>

      <label data-field>
        Sort
        <input type="number" name="sort" value="0">
        <small>（同级排序，越小越靠前）</small>
      </label>
    </div>
  </div>
</form>
{% endblock %}
