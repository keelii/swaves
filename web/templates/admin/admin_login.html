{% import "/admin/includes/ui_macros" as ui %}
<style>
    body {
        height: 100vh;
        overflow: hidden;
        max-width: none;
        padding: 0;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--muted);
    }

    .login-container {
        width: 100%;
        max-width: 350px;
        padding: 1rem;
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-logo {
        font-size: 3rem;
        margin-bottom: 0.5rem;
    }

    .login-title {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--foreground);
        margin: 0;
    }

    .login-subtitle {
        font-size: 0.9rem;
        color: var(--muted-foreground);
        margin-top: 0.25rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--card);
        color: var(--foreground);
    }

    .password-wrapper {
        position: relative;
    }

    .login-button {
        width: 100%;
        padding: 0.75rem 1rem;
        color: var(--primary-foreground);
        background: var(--primary);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0 2px 4px rgba(0, 116, 217, 0.2);
    }

    .login-button:hover {
        background: var(--admin-primary-hover);
        box-shadow: 0 4px 8px rgba(0, 116, 217, 0.3);
        transform: translateY(-1px);
    }

    .login-button:active {
        transform: translateY(0);
    }

    .login-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
</style>

<div class="login-container">
  <div class="content-box">
    <div class="login-header">
      <div class="login-logo">🔐</div>
      <h1 class="login-title">开始吧，{{ settings("author") }}</h1>
    </div>

    {{ ui.error_message(dict("Error", Error)) }}

    <form id="form" method="POST" action="{{ url_for("admin.login.submit") }}">
      {% if ReturnUrl %}<input type="hidden" name="returnUrl" value="{{ ReturnUrl }}">{% endif %}
      <div class="form-group">
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="请输入密码"
            autocomplete="current-password"
            autofocus
            required
          >
        </div>
      </div>
      <button type="submit" class="login-button large" id="loginButton">登录</button>
    </form>
  </div>
</div>
