{% extends "/admin/layout/layout" %}
{% block content %}
{% from "/admin/macro/ui" import toggle %}
<form id="form" method="post" action="{{ url_for("admin.redirects.update", (dict("id", Redirect.ID))) }}">
  <div class="row">
    <div class="col-6">
      <label data-field>
        来源路径
        <input type="text" name="from" required value="{{ Redirect.From }}" placeholder="/old-path">
      </label>

      <label data-field>
        目标路径
        <input type="text" name="to" required value="{{ Redirect.To }}" placeholder="/new-path">
      </label>

      <label data-field>
        状态码
        <select name="status">
          <option value="301"{% if Redirect.Status == 301 %} selected{% endif %}>301 - 永久重定向</option>
          <option value="302"{% if Redirect.Status == 302 %} selected{% endif %}>302 - 临时重定向</option>
        </select>
      </label>

      <label data-field>
        启用
        {{ toggle(printf("redirect_enabled_%d", Redirect.ID), "enabled", checked=(Redirect.Enabled == 1), data_labels="禁用,启用", data_on_value="1", data_off_value="0") }}
      </label>
    </div>
  </div>
</form>
{% endblock %}
