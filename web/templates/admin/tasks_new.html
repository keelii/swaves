{% extends "/admin/layout/layout" %}
{% block content %}

<form id="form" method="post" action="{{ url_for("admin.tasks.create") }}">
  <div class="row">
    <div class="col-6">
      <label data-field>
        是否启用
        {{ ui.toggle("task_enabled_new", "enabled", checked=true, data_labels="禁用,启用", data_on_value="1", data_off_value="0") }}
      </label>

      <fieldset>
        <legend>任务类型</legend>
          <label>
            <input type="radio" name="kind" value="0" checked>
            内部任务（不生成运行记录）
          </label>
          <label>
            <input type="radio" name="kind" value="1">
            用户任务（生成运行记录）
          </label>
        <p>
          <small>内部任务执行时不写入任务运行记录表（TaskRun）</small>
        </p>
      </fieldset>

      <label data-field>
        任务名称
        <input type="text" name="name" required placeholder="任务名称">
      </label>

      <label data-field>
        任务编码
        <input type="text" name="code" required placeholder="task_code">
        <small>用于在代码中识别此任务，必须唯一</small>
      </label>

      <label data-field>
        执行频率
        <select id="schedule-preset">
          <option value="@hourly">每小时</option>
          <option value="@daily" selected>每天</option>
          <option value="@weekly">每周</option>
          <option value="@monthly">每月</option>
          <option value="@yearly">每年</option>
          <option value="__custom__">自定义</option>
        </select>
        <small>选择任务执行频率，或切换为自定义 Cron 表达式。</small>
      </label>

      <label data-field id="schedule-custom-wrap" hidden>
        自定义 Cron 表达式
        <input type="text" id="schedule-custom" placeholder="例如: 0 */5 * * *">
      </label>
      <input type="hidden" name="schedule" id="schedule-value" value="@daily">

      <label data-field>
        任务描述
        <textarea name="description" rows="3" cols="60" placeholder="任务描述"></textarea>
      </label>
    </div>
  </div>
</form>

<script>
$(function() {
  var $preset = $('#schedule-preset');
  var $wrap = $('#schedule-custom-wrap');
  var $custom = $('#schedule-custom');
  var $val = $('#schedule-value');

  function sync() {
    $val.val($preset.val() === '__custom__' ? $custom.val() : $preset.val());
  }

  function ui.toggle() {
    var isCustom = $preset.val() === '__custom__';
    $wrap.prop('hidden', !isCustom);
    sync();
  }

  ui.toggle();

  $preset.on('change', function() {
    ui.toggle();
    if ($preset.val() === '__custom__') {
      $custom.focus();
    }
  });

  $custom.on('input change', sync);

  $('#form').on('submit', function(e) {
    if ($preset.val() === '__custom__' && !$custom.val().trim()) {
      e.preventDefault();
      $custom.focus();
      return false;
    }
    sync();
  });
});
</script>
{% endblock %}
