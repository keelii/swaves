<form id="form" method="post" action="{{ url_for "admin.categories.update" (dict "id" .Category.ID) }}">
  <div class="row">
    <div class="col-6">
      <label data-field>
        Parent Category
        <select name="parent_id">
          <option value="0"{{ if eq .Category.ParentID 0 }} selected{{ end }}>顶级分类</option>
          {{ range .Categories }}
            <option value="{{ .ID }}"{{ if eq $.Category.ParentID .ID }} selected{{ end }}>{{ .Name }}</option>
          {{ end }}
        </select>
        <small>(Select parent category, or "None" for top level)</small>
      </label>

      <label data-field>
        Name
        <input type="text" name="name" required value="{{ .Category.Name }}" placeholder="分类名称">
        <small>(Display name)</small>
      </label>

      <label data-field>
        Slug
        <input type="text" name="slug" required value="{{ .Category.Slug }}" placeholder="url-friendly-identifier">
        <small>(URL-friendly identifier, must be unique under same parent)</small>
      </label>

      <label data-field>
        Description
        <textarea name="description" rows="3" cols="80" placeholder="可选描述信息">{{ .Category.Description }}</textarea>
        <small>(Optional description)</small>
      </label>

      <label data-field>
        Sort
        <input type="number" name="sort" value="{{ .Category.Sort }}">
        <small>(Sort order within same parent level)</small>
      </label>
    </div>
  </div>
</form>
