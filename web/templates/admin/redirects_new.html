<form id="form" method="post" action="{{ url_for "admin.redirects.create" }}">
  <div class="row">
    <div class="col-6">
      <label data-field>
        From
        <input type="text" name="from" required placeholder="/old-path">
      </label>

      <label data-field>
        To
        <input type="text" name="to" required placeholder="/new-path">
      </label>

      <label data-field>
        Status (状态码)
        <select name="status">
          <option value="301" selected>301 - Permanent Redirect</option>
          <option value="302">302 - Temporary Redirect</option>
        </select>
      </label>

      <label data-field>
        Enabled (启用)
        {{ template "admin/includes/toggle" dict "ID" "redirect_enabled_new" "Name" "enabled" "Checked" true "DataLabels" "禁用,启用" "DataOnValue" "1" "DataOffValue" "0" }}
      </label>
    </div>
  </div>
</form>
