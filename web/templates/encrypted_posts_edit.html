
<form id="form" method="post" action="/admin/encrypted-posts/{{ .Post.ID }}/edit">
  <p>
    <input type="text" name="title" value="{{ .Post.Title }}" required placeholder="加密文章标题">
  </p>

  <p>
    <input type="text" name="slug" value="{{ .Post.Slug }}" disabled>
  </p>

  <p>
    <input type="password" name="password" placeholder="留空以保持当前密码">
  </p>

  <p>
    <label>
      Expires At (可选)
      {{ $customDate := "" }}
      {{ if .Post.ExpiresAt }}
        {{ $customDate = formatDateTimeLocal .Post.ExpiresAt }}
      {{ end }}
      <label><input type="radio" name="expires_at_option" value="none" {{ if not .Post.ExpiresAt }}checked{{ end }}> Never</label>
      <label><input type="radio" name="expires_at_option" value="5min"> 5 minutes</label>
      <label><input type="radio" name="expires_at_option" value="1hour"> 1 hour</label>
      <label><input type="radio" name="expires_at_option" value="1day"> 1 day</label>
      <label><input type="radio" name="expires_at_option" value="custom" {{ if .Post.ExpiresAt }}checked{{ end }}> Other</label>
      <div id="custom-date-container" style="display: {{ if .Post.ExpiresAt }}block{{ else }}none{{ end }}; margin-top: 10px;">
        <input type="datetime-local" name="expires_at_custom" id="expires_at_custom" value="{{ $customDate }}">
      </div>
      <input type="hidden" name="expires_at" id="expires_at_hidden" value="{{ $customDate }}">
    </label>
  </p>

  <script>
$(function() {
  var $opt = $('input[name="expires_at_option"]'), $customWrap = $('#custom-date-container'), $custom = $('#expires_at_custom'), $hidden = $('#expires_at_hidden');
  function toggleCustomDate() {
    var v = $opt.filter(':checked').val();
    if (v === 'custom') {
      $customWrap.show();
    } else {
      $customWrap.hide();
      if (v !== 'custom') $custom.val('');
    }
  }
  function fmtDate(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + 'T' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }
  $opt.on('change', toggleCustomDate);
  toggleCustomDate();
  $('#form').on('submit', function() {
    var v = $opt.filter(':checked').val();
    if (v === 'custom' && $custom.val()) {
      $hidden.val($custom.val());
    } else if (v === 'none') {
      $hidden.val('');
    } else if (v === '5min' || v === '1hour' || v === '1day') {
      var now = new Date(), t = now.getTime();
      if (v === '5min') t += 5 * 60 * 1000;
      else if (v === '1hour') t += 60 * 60 * 1000;
      else t += 24 * 60 * 60 * 1000;
      $hidden.val(fmtDate(new Date(t)));
    }
  });
});
  </script>

  {{ template "partials/markdown_preview" dict "Placeholder" "加密文章内容（支持 Markdown）" "Value" .Post.Content }}

</form>
