
<form id="form" method="post" action="/admin/encrypted-posts/{{ .Post.ID }}/edit">
  <p>
    <input type="text" name="title" value="{{ .Post.Title }}" required placeholder="加密文章标题">
  </p>

  <p>
    <input type="text" name="slug" value="{{ .Post.Slug }}" disabled>
  </p>

  <p>
    <input type="password" name="password" placeholder="留空以保持当前密码">
  </p>

  <p>
    {{ $displayDate := "" }}{{ if .Post.ExpiresAt }}{{ $displayDate = formatTime .Post.ExpiresAt }}{{ end }}
  </p>

  {{ template "partials/markdown_preview" dict "Placeholder" "加密文章内容（支持 Markdown）" "Value" .Post.Content }}

</form>
