{{ if .Error }}
<p style="color: red;">Error: {{ .Error }}</p>
{{ end }}

<h2>导出数据库</h2>

<p>
  导出当前数据库为 SQLite 文件，可用于备份或迁移。
</p>

<div style="margin: 2em 0; padding: 1.5em; background: var(--nc-bg-2); border-radius: 4px; border: 1px solid var(--nc-bg-3);">
  <h3>数据库导出</h3>
  <p>
    <small>点击下方按钮即可导出完整的数据库文件，文件将保存到浏览器的默认下载目录，文件名包含时间戳。</small>
  </p>
  <p style="margin-top: 1em;">
    <a href="/admin/export/download" class="btn primary" style="display: inline-block; padding: 10px 20px; font-size: 16px;">导出数据库</a>
  </p>
</div>

<div style="margin-top: 2em; padding: 1em; background: var(--nc-bg-2); border-left: 3px solid var(--nc-lk-1);">
  <p style="margin: 0;">
    <strong>注意：</strong>
  </p>
  <ul style="margin: 0.5em 0 0 1.5em; padding: 0;">
    <li>导出的文件包含所有数据（文章、标签、分类、设置等）</li>
    <li>文件格式为 SQLite 数据库文件（.sqlite）</li>
    <li>导出的文件可用于在其他 Swaves 实例中恢复数据</li>
    <li>导出过程可能需要几秒钟，请耐心等待</li>
    <li>文件将保存到浏览器的默认下载目录</li>
  </ul>
</div>
