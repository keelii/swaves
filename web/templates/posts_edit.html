
<form id="form" method="post" action="/admin/posts/{{ .Post.ID }}/edit">
  <p>
    <input type="text" name="title" value="{{ .Post.Title }}" required placeholder="文章标题">
  </p>

  <p>
    <input type="text" name="slug" value="{{ .Post.Slug }}" disabled>
  </p>

  <p>
    <select name="status">
      <option value="draft" {{ if eq .Post.Status "draft" }}selected{{ end }}>Draft</option>
      <option value="published" {{ if eq .Post.Status "published" }}selected{{ end }}>Published</option>
    </select>
  </p>

  <p>
    {{ template "partials/tag_select" . }}
    <input type="text" name="new_tags" placeholder="New tags: comma separated">
    <input type="hidden" name="tags" id="tags-input">
  </p>

  <p>
    {{ template "partials/category_select" dict "Root" $ "SelectedID" .Category.ID }}
  </p>

  <div>
    <div>
      <textarea name="content" rows="10" cols="80" placeholder="文章内容（支持 Markdown）">{{ .Post.Content }}</textarea>
    </div>
  </div>

</form>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const checkboxes = document.querySelectorAll('.tag-checkbox:checked');
  const tagIDs = Array.from(checkboxes).map(cb => cb.value);
  document.getElementById('tags-input').value = tagIDs.join(',');


  // 处理分类选择框（单选）
  const categorySelect = document.getElementById('categories-select');
  // select 的 name 已经是 'categories'，直接使用即可
});
</script>
