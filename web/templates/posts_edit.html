<form id="form" method="post" action="/admin/posts/{{ .Post.ID }}/edit">
  <div class="row">
    <div class="col-6">
      <label data-field>
        文章标题
        <input class="w-100" type="text" name="title" value="{{ .Post.Title }}" required placeholder="文章标题">
      </label>

      <label data-field>
        文章 URL 地址
        <span class="hstack">
          <span>/</span>
          <input type="text" value="{{ .Post.Slug }}" disabled style="flex: 1;">
        </span>
      </label>

      <fieldset class="hstack">
        <legend>Kind (类型)</legend>
        {{ template "partials/form_field_radio" dict "Label" "" "Name" "kind" "Options" (slice (dict "Value" "0" "Label" "post (文章)") (dict "Value" "1" "Label" "page (页面)")) "Selected" (printf "%d" .Post.Kind) }}
      </fieldset>

      <label data-field>
        标签
        {{ template "partials/tag_select" . }}
      </label>

      <label data-field>
        分类
        {{ template "partials/category_select" dict "Root" $ "SelectedID" .Category.ID }}
      </label>
    </div>
  </div>

  {{ template "partials/markdown_preview" dict "Value" .Post.Content }}

</form>
