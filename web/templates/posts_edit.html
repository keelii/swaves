
<form method="post" action="/admin/posts/{{ .Post.ID }}/edit">

  <p>
    <label>ID:</label> {{ .Post.ID }}
  </p>

  <p>
    <label>Title</label>
    <input type="text" name="title" value="{{ .Post.Title }}" required>
  </p>

  <p>
    <label>Slug</label>
    <input type="text" name="slug" value="{{ .Post.Slug }}" disabled>
  </p>

  <p>
    <label>Status</label>
    <select name="status">
      <option value="draft" {{ if eq .Post.Status "draft" }}selected{{ end }}>Draft</option>
      <option value="published" {{ if eq .Post.Status "published" }}selected{{ end }}>Published</option>
    </select>
  </p>

  <p>
    <label>Tags</label><br>
    {{ if .Tags }}
      {{ range .Tags }}
      <label style="display:inline-block; margin-right:10px;">
        <input type="checkbox" class="tag-checkbox" value="{{ .ID }}" {{ if index $.SelectedTagIDs .ID }}checked{{ end }}> {{ .Name }}
      </label>
      {{ end }}
    {{ else }}
      <span>No tags available. <a href="/admin/tags/new">Create a tag</a></span>
    {{ end }}
    <input type="hidden" name="tags" id="tags-input">
  </p>

  <div>
    <label>Content</label>
    <div>
      <textarea name="content" rows="10" cols="80">{{ .Post.Content }}</textarea>
    </div>
  </div>

  <p>
    <button type="submit">Save</button>
    <a href="/admin/posts">Back</a>
  </p>

</form>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const checkboxes = document.querySelectorAll('.tag-checkbox:checked');
  const tagIDs = Array.from(checkboxes).map(cb => cb.value);
  document.getElementById('tags-input').value = tagIDs.join(',');
});
</script>
