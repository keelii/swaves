<link rel="stylesheet" href="/static/choices/choices.css" />
<script src="/static/choices/choices.min.js"></script>

<form id="form" method="post" action="/admin/posts/{{ .Post.ID }}/edit">
  <p class="valign gap-10">
    <span>
      <input type="text" name="title" value="{{ .Post.Title }}" required placeholder="文章标题">
    </span>
    <span>/{{ .Post.Slug }}</span>
      {{ template "partials/toggle" dict "ID" (printf "status_%d" .Post.ID) "Name" "status" "Checked" (eq .Post.Status "published") "DataLabels" "草稿,发布" }}
  </p>

  <div class="salign gap-10">
    <p class="grow">
      {{ template "partials/tag_select" . }}
    </p>

    <p class="grow">
      {{ template "partials/category_select" dict "Root" $ "SelectedID" .Category.ID }}
    </p>
  </div>

  <div>
    <div>
      <textarea name="content" rows="10" cols="80" placeholder="文章内容（支持 Markdown）">{{ .Post.Content }}</textarea>
    </div>
  </div>

</form>
