
<form id="form" method="post" action="/admin/tasks/new">

  <p>
    <label>
      Code (唯一标识)<br>
      <input type="text" name="code" id="code" required>
      <small>用于在代码中识别此任务，必须唯一</small>
    </label>
  </p>

  <p>
    <label>
      Name (任务名称)<br>
      <input type="text" name="name" id="name" required>
    </label>
  </p>

  <p>
    <label>
      Description (描述)<br>
      <textarea name="description" rows="3" cols="60"></textarea>
    </label>
  </p>

  <p>
    <label>
      Schedule (Cron 表达式)<br>
      <input type="text" name="schedule" id="schedule" required placeholder="例如: 0 */5 * * *">
      <small>标准 cron 表达式，如 "0 */5 * * *" 表示每5小时执行一次</small>
    </label>
  </p>

  <p>
    <label>
      <input type="checkbox" name="enabled" value="1" checked>
      Enabled (启用状态)
    </label>
  </p>

</form>
