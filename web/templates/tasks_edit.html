
<form id="form" method="post" action="/admin/tasks/{{ .Task.ID }}/edit">

  <p>
    <label>
      Code (唯一标识)<br>
      <input type="text" value="{{ .Task.Code }}" disabled>
      <input type="hidden" name="code" value="{{ .Task.Code }}">
      <small>用于在代码中识别此任务，必须唯一（不可修改）</small>
    </label>
  </p>

  <p>
    <label>
      Name (任务名称)<br>
      <input type="text" name="name" id="name" value="{{ .Task.Name }}" required>
    </label>
  </p>

  <p>
    <label>
      Description (描述)<br>
      <textarea name="description" rows="3" cols="60">{{ .Task.Description }}</textarea>
    </label>
  </p>

  <p>
    <label>
      Schedule (Cron 表达式)<br>
      <input type="text" name="schedule" id="schedule" value="{{ .Task.Schedule }}" required placeholder="例如: 0 */5 * * *">
      <small>标准 cron 表达式，如 "0 */5 * * *" 表示每5小时执行一次</small>
    </label>
  </p>

  <p>
    <label>
      <input type="checkbox" name="enabled" value="1" {{ if eq .Task.Enabled 1 }}checked{{ end }}>
      Enabled (启用状态)
    </label>
  </p>

</form>
