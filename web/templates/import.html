
{{ if .Error }}
<p style="color: red;">Error: {{ .Error }}</p>
{{ end }}

<form id="form" method="post" action="/admin/import" enctype="multipart/form-data">

  <p>
    <label>
      Select Markdown Files<br>
      <input type="file" name="files" accept=".md,.markdown,text/markdown" multiple required>
      <small>(You can select multiple files)</small>
    </label>
  </p>

  <p>
    <label>
      Title Source<br>
      <select name="title_source" required>
        <option value="frontmatter" selected>From Frontmatter Field (default: title)</option>
        <option value="filename">From Filename</option>
        <option value="markdown">From Markdown Heading</option>
      </select>
      <input type="text" name="title_field" id="title_field_container" value="title" placeholder="title" style="display: none;">
    </label>
  </p>

  <p id="title_level_container" style="display: none;">
    <label>
      Heading Level<br>
      <select name="title_level">
        <option value="1" selected>H1 (# Title)</option>
        <option value="2">H2 (## Title)</option>
        <option value="3">H3 (### Title)</option>
      </select>
      <small>(The heading level to extract from markdown)</small>
    </label>
  </p>

  <p>
    <label>
      Slug Source<br>
      <select name="slug_source" required>
        <option value="filename" selected>From Filename</option>
        <option value="frontmatter">From Frontmatter Field (default: slug)</option>
        <option value="title">From Title (generated)</option>
      </select>
      <input type="text" name="slug_field" id="slug_field_container" value="slug" placeholder="slug" style="display: none;">
    </label>
  </p>

  <p>
    <label>
      Post Created Source<br>
      <select name="created_source" required>
        <option value="frontmatter" selected>From Frontmatter Field (default: date)</option>
        <option value="filetime">From File Time (current time)</option>
      </select>
      <input type="text" name="created_field" id="created_field_container" value="date" placeholder="date">
    </label>
  </p>

  <p>
    <label>
      Status Source<br>
      <select name="status_source" required>
        <option value="frontmatter" selected>From Frontmatter Field (default: draft)</option>
        <option value="alldraft">All Draft</option>
        <option value="allpublished">All Published</option>
      </select>
      <input type="text" name="status_field" id="status_field_container" value="draft" placeholder="draft">
    </label>
  </p>

  <p>
    <label>
      Category Source<br>
      <select name="category_source" required>
        <option value="none" selected>None (留空)</option>
        <option value="frontmatter">From Frontmatter Field (default: categories)</option>
        <option value="autocreate">Auto Create Default Category</option>
      </select>
      <input type="text" name="category_field" id="category_field_container" value="categories" placeholder="category" style="display: none;">
    </label>
  </p>

  <p>
    <label>
      Tag Source<br>
      <select name="tag_source" required>
        <option value="none" selected>None (留空)</option>
        <option value="frontmatter">From Frontmatter Field (default: tags)</option>
        <option value="autocreate">Auto Create Default Tag</option>
      </select>
      <input type="text" name="tag_field" id="tag_field_container" value="tags" placeholder="tags" style="display: none;">
    </label>
  </p>

  <p>
    <small>
      Markdown 文件应包含 frontmatter，例如：<br>
      <pre>---
title: 文章标题
slug: article-slug
date: 2011-05-12T02:20:04.000Z
status: draft
# only first one category supported
categories:
  - category1
tags:
  - tag1
  - tag2
---

文章内容...</pre>
    </small>
  </p>

</form>

<script>
(function() {
  const titleSourceSelect = document.querySelector('select[name="title_source"]');
  const titleFieldContainer = document.getElementById('title_field_container');
  const titleLevelContainer = document.getElementById('title_level_container');
  
  const slugSourceSelect = document.querySelector('select[name="slug_source"]');
  const slugFieldContainer = document.getElementById('slug_field_container');
  
  const createdSourceSelect = document.querySelector('select[name="created_source"]');
  const createdFieldContainer = document.getElementById('created_field_container');
  
  const statusSourceSelect = document.querySelector('select[name="status_source"]');
  const statusFieldContainer = document.getElementById('status_field_container');
  
  const categorySourceSelect = document.querySelector('select[name="category_source"]');
  const categoryFieldContainer = document.getElementById('category_field_container');
  
  const tagSourceSelect = document.querySelector('select[name="tag_source"]');
  const tagFieldContainer = document.getElementById('tag_field_container');
  
  function updateTitleFieldVisibility() {
    if (titleSourceSelect.value === 'frontmatter') {
      titleFieldContainer.style.display = 'inline';
      titleLevelContainer.style.display = 'none';
    } else if (titleSourceSelect.value === 'markdown') {
      titleFieldContainer.style.display = 'none';
      titleLevelContainer.style.display = 'inline';
    } else {
      titleFieldContainer.style.display = 'none';
      titleLevelContainer.style.display = 'none';
    }
  }
  
  function updateSlugFieldVisibility() {
    if (slugSourceSelect.value === 'frontmatter') {
      slugFieldContainer.style.display = 'inline';
    } else {
      slugFieldContainer.style.display = 'none';
    }
  }
  
  function updateCreatedFieldVisibility() {
    if (createdSourceSelect.value === 'frontmatter') {
      createdFieldContainer.style.display = 'inline';
    } else {
      createdFieldContainer.style.display = 'none';
    }
  }
  
  function updateStatusFieldVisibility() {
    if (statusSourceSelect.value === 'frontmatter') {
      statusFieldContainer.style.display = 'inline';
    } else {
      statusFieldContainer.style.display = 'none';
    }
  }
  
  function updateCategoryFieldVisibility() {
    if (categorySourceSelect.value === 'frontmatter') {
      categoryFieldContainer.style.display = 'inline';
    } else {
      categoryFieldContainer.style.display = 'none';
    }
  }
  
  function updateTagFieldVisibility() {
    if (tagSourceSelect.value === 'frontmatter') {
      tagFieldContainer.style.display = 'inline';
    } else {
      tagFieldContainer.style.display = 'none';
    }
  }
  
  titleSourceSelect.addEventListener('change', updateTitleFieldVisibility);
  slugSourceSelect.addEventListener('change', updateSlugFieldVisibility);
  createdSourceSelect.addEventListener('change', updateCreatedFieldVisibility);
  statusSourceSelect.addEventListener('change', updateStatusFieldVisibility);
  categorySourceSelect.addEventListener('change', updateCategoryFieldVisibility);
  tagSourceSelect.addEventListener('change', updateTagFieldVisibility);
  
  updateTitleFieldVisibility(); // 初始化
  updateSlugFieldVisibility(); // 初始化
  updateCreatedFieldVisibility(); // 初始化
  updateStatusFieldVisibility(); // 初始化
  updateCategoryFieldVisibility(); // 初始化
  updateTagFieldVisibility(); // 初始化
})();
</script>
