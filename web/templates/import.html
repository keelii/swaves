
{{ if .Error }}
<p style="color: red;">Error: {{ .Error }}</p>
{{ end }}

<form method="post" action="/admin/import" enctype="multipart/form-data">

  <p>
    <label>
      Select Markdown Files<br>
      <input type="file" name="files" accept=".md,.markdown,text/markdown" multiple required>
      <small>(You can select multiple files)</small>
    </label>
  </p>

  <p>
    <label>
      Title Source<br>
      <select name="title_source" required>
        <option value="frontmatter" selected>From Frontmatter Field (default: title)</option>
        <option value="filename">From Filename</option>
        <option value="markdown">From Markdown Heading</option>
      </select>
    </label>
  </p>

  <p id="title_field_container" style="display: none;">
    <label>
      Frontmatter Field Name<br>
      <input type="text" name="title_field" value="title" placeholder="title">
      <small>(The field name in frontmatter to use as title, default: title)</small>
    </label>
  </p>

  <p id="title_level_container" style="display: none;">
    <label>
      Heading Level<br>
      <select name="title_level">
        <option value="1" selected>H1 (# Title)</option>
        <option value="2">H2 (## Title)</option>
        <option value="3">H3 (### Title)</option>
      </select>
      <small>(The heading level to extract from markdown)</small>
    </label>
  </p>

  <p>
    <label>
      Slug Source<br>
      <select name="slug_source" required>
        <option value="filename" selected>From Filename</option>
        <option value="frontmatter">From Frontmatter Field (default: slug)</option>
        <option value="title">From Title (generated)</option>
      </select>
    </label>
  </p>

  <p id="slug_field_container" style="display: none;">
    <label>
      Frontmatter Field Name<br>
      <input type="text" name="slug_field" value="slug" placeholder="slug">
      <small>(The field name in frontmatter to use as slug, default: slug)</small>
    </label>
  </p>

  <p>
    <small>
      Markdown 文件应包含 frontmatter，例如：<br>
      <pre>---
title: 文章标题
slug: article-slug
date: 2011-05-12T02:20:04.000Z
status: draft
tags:
  - tag1
  - tag2
---

文章内容...</pre>
    </small>
  </p>

  <p>
    <button type="submit">Import</button>
    <a href="/admin/posts">Cancel</a>
  </p>

</form>

<script>
(function() {
  const titleSourceSelect = document.querySelector('select[name="title_source"]');
  const titleFieldContainer = document.getElementById('title_field_container');
  const titleLevelContainer = document.getElementById('title_level_container');
  
  const slugSourceSelect = document.querySelector('select[name="slug_source"]');
  const slugFieldContainer = document.getElementById('slug_field_container');
  
  function updateTitleFieldVisibility() {
    if (titleSourceSelect.value === 'frontmatter') {
      titleFieldContainer.style.display = 'block';
      titleLevelContainer.style.display = 'none';
    } else if (titleSourceSelect.value === 'markdown') {
      titleFieldContainer.style.display = 'none';
      titleLevelContainer.style.display = 'block';
    } else {
      titleFieldContainer.style.display = 'none';
      titleLevelContainer.style.display = 'none';
    }
  }
  
  function updateSlugFieldVisibility() {
    if (slugSourceSelect.value === 'frontmatter') {
      slugFieldContainer.style.display = 'block';
    } else {
      slugFieldContainer.style.display = 'none';
    }
  }
  
  titleSourceSelect.addEventListener('change', updateTitleFieldVisibility);
  slugSourceSelect.addEventListener('change', updateSlugFieldVisibility);
  
  updateTitleFieldVisibility(); // 初始化
  updateSlugFieldVisibility(); // 初始化
})();
</script>
