<style>
  select {
    min-width: 30em;
  }
</style>

<form id="form" method="post" action="/admin/import" enctype="multipart/form-data">

  <p>
    <label>
      Select Markdown Files<br>
      <input type="file" name="files" accept=".md,.markdown,text/markdown" multiple required>
      <small>(You can select multiple files)</small>
    </label>
  </p>

  <p>
    <label>
      Title Source<br>
      <select name="title_source" required>
        <option value="frontmatter" selected>From Frontmatter Field (default: title)</option>
        <option value="filename">From Filename</option>
        <option value="markdown">From Markdown Heading</option>
      </select>
      <input type="text" name="title_field" id="title_field_container" value="title" placeholder="title" style="display: none;">
    </label>
  </p>

  <p id="title_level_container" style="display: none;">
    <label>
      Heading Level<br>
      <select name="title_level">
        <option value="1" selected>H1 (# Title)</option>
        <option value="2">H2 (## Title)</option>
        <option value="3">H3 (### Title)</option>
      </select>
      <small>(The heading level to extract from markdown)</small>
    </label>
  </p>

  <p>
    <label>
      Slug Source<br>
      <select name="slug_source" required>
        <option value="filename" selected>From Filename</option>
        <option value="frontmatter">From Frontmatter Field (default: slug)</option>
        <option value="title">From Title (generated)</option>
      </select>
      <input type="text" name="slug_field" id="slug_field_container" value="slug" placeholder="slug" style="display: none;">
    </label>
  </p>

  <p>
    <label>
      Post Created Source<br>
      <select name="created_source" required>
        <option value="frontmatter" selected>From Frontmatter Field (default: date)</option>
        <option value="filetime">From File Time (current time)</option>
      </select>
      <input type="text" name="created_field" id="created_field_container" value="date" placeholder="date">
    </label>
  </p>

  <p>
    <label>
      Status Source<br>
      <select name="status_source" required>
        <option value="frontmatter" selected>From Frontmatter Field (default: draft)</option>
        <option value="alldraft">All Draft</option>
        <option value="allpublished">All Published</option>
      </select>
      <input type="text" name="status_field" id="status_field_container" value="draft" placeholder="draft">
    </label>
  </p>

  <p>
    <label>
      Category Source<br>
      <select name="category_source" required>
        <option value="none">None (留空)</option>
        <option value="frontmatter" selected>From Frontmatter Field (default: categories)</option>
        <option value="autocreate">Auto Create Default Category</option>
      </select>
      <input type="text" name="category_field" id="category_field_container" value="categories" placeholder="category" style="display: none;">
    </label>
  </p>

  <p>
    <label>
      Tag Source<br>
      <select name="tag_source" required>
        <option value="none">None (留空)</option>
        <option value="frontmatter" selected>From Frontmatter Field (default: tags)</option>
        <option value="autocreate">Auto Create Default Tag</option>
      </select>
      <input type="text" name="tag_field" id="tag_field_container" value="tags" placeholder="tags" style="display: none;">
    </label>
  </p>

  <p>
    <small>
      Markdown 文件应包含 frontmatter，例如：<br>
      <pre>---
title: 文章标题
slug: article-slug
date: 2011-05-12T02:20:04.000Z
status: draft
# only first one category supported
categories:
  - category1
tags:
  - tag1
  - tag2
---

文章内容...</pre>
    </small>
  </p>

</form>

<script>
$(function() {
  function show(sel, disp) { $(sel).css('display', disp || 'inline'); }
  function hide(sel) { $(sel).css('display', 'none'); }
  $('select[name="title_source"]').on('change', function() {
    var v = $(this).val();
    if (v === 'frontmatter') { show('#title_field_container'); hide('#title_level_container'); }
    else if (v === 'markdown') { hide('#title_field_container'); show('#title_level_container'); }
    else { hide('#title_field_container'); hide('#title_level_container'); }
  }).trigger('change');
  $('select[name="slug_source"]').on('change', function() {
    $(this).val() === 'frontmatter' ? show('#slug_field_container') : hide('#slug_field_container');
  }).trigger('change');
  $('select[name="created_source"]').on('change', function() {
    $(this).val() === 'frontmatter' ? show('#created_field_container') : hide('#created_field_container');
  }).trigger('change');
  $('select[name="status_source"]').on('change', function() {
    $(this).val() === 'frontmatter' ? show('#status_field_container') : hide('#status_field_container');
  }).trigger('change');
  $('select[name="category_source"]').on('change', function() {
    $(this).val() === 'frontmatter' ? show('#category_field_container') : hide('#category_field_container');
  }).trigger('change');
  $('select[name="tag_source"]').on('change', function() {
    $(this).val() === 'frontmatter' ? show('#tag_field_container') : hide('#tag_field_container');
  }).trigger('change');
});
</script>
