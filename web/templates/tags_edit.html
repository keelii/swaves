
<form id="form" method="post" action="/admin/tags/{{ .Tag.ID }}/edit">

  <p>
    <label>ID:</label> {{ .Tag.ID }}
  </p>

  <p>
    <label>Name</label>
    <input type="text" name="name" value="{{ .Tag.Name }}" required>
  </p>

  <p>
    <label>Slug</label>
    <input type="text" name="slug" value="{{ .Tag.Slug }}" required>
  </p>

</form>
