<h1>Settings</h1>

<form method="post" action="/admin/settings">

  <p>
    <label>Name</label>
    <input type="text" name="name" value="{{ .Settings.Name }}" required>
  </p>

  <p>
    <label>Language</label>
    <input type="text" name="language" value="{{ .Settings.Language }}" required>
  </p>

  <p>
    <label>Timezone</label>
    <input type="text" name="timezone" value="{{ .Settings.Timezone }}" required>
  </p>

  <p>
    <label>Post Slug Pattern</label>
    <input type="text" name="post_slug_pattern" value="{{ .Settings.PostSlugPattern }}" required>
  </p>

  <p>
    <label>Tag Slug Pattern</label>
    <input type="text" name="tag_slug_pattern" value="{{ .Settings.TagSlugPattern }}" required>
  </p>

  <p>
    <label>Tags Pattern</label>
    <input type="text" name="tags_pattern" value="{{ .Settings.TagsPattern }}" required>
  </p>

  <p>
    <label>Giscus Config (JSON)</label>
    <textarea name="giscus_config" rows="5" cols="80">{{ .Settings.GiscusConfig }}</textarea>
  </p>

  <p>
    <label>GA4 ID</label>
    <input type="text" name="ga4_id" value="{{ .Settings.GA4ID }}">
  </p>

  <p>
    <label>Admin Password (leave empty to keep current)</label>
    <input type="password" name="admin_password">
  </p>

  <p>
    <button type="submit">Save</button>
  </p>

</form>
