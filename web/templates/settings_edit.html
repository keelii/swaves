{{ if .Error }}
<p style="color: red;">Error: {{ .Error }}</p>
{{ end }}

<form method="post" action="/admin/settings/{{ .Setting.ID }}/edit">

  <p>
    <label>ID:</label> {{ .Setting.ID }}
  </p>

  <p>
    <label>
      Kind<br>
      <input type="text" name="kind" value="{{ .Setting.Kind }}" required>
      <small>(e.g., system, url, integration, default)</small>
    </label>
  </p>

  <p>
    <label>
      Name<br>
      <input type="text" name="name" value="{{ .Setting.Name }}" required>
      <small>(Human readable name)</small>
    </label>
  </p>

  <p>
    <label>
      Code<br>
      <input type="text" name="code" value="{{ .Setting.Code }}" required>
      <small>(Unique key, e.g., site_name, admin_password)</small>
    </label>
  </p>

  <p>
    <label>
      Type<br>
      <select name="type" required disabled>
        <option value="text" {{ if eq .Setting.Type "text" }}selected{{ end }}>text</option>
        <option value="number" {{ if eq .Setting.Type "number" }}selected{{ end }}>number</option>
        <option value="date" {{ if eq .Setting.Type "date" }}selected{{ end }}>date</option>
        <option value="time" {{ if eq .Setting.Type "time" }}selected{{ end }}>time</option>
        <option value="datetime" {{ if eq .Setting.Type "datetime" }}selected{{ end }}>datetime</option>
        <option value="url" {{ if eq .Setting.Type "url" }}selected{{ end }}>url</option>
        <option value="range" {{ if eq .Setting.Type "range" }}selected{{ end }}>range</option>
        <option value="password" {{ if eq .Setting.Type "password" }}selected{{ end }}>password</option>
        <option value="radio" {{ if eq .Setting.Type "radio" }}selected{{ end }}>radio</option>
        <option value="checkbox" {{ if eq .Setting.Type "checkbox" }}selected{{ end }}>checkbox</option>
        <option value="select" {{ if eq .Setting.Type "select" }}selected{{ end }}>select</option>
        <option value="textarea" {{ if eq .Setting.Type "textarea" }}selected{{ end }}>textarea</option>
      </select>
      <input type="hidden" name="type" value="{{ .Setting.Type }}">
      <small>(Type cannot be changed after creation)</small>
    </label>
  </p>

  <p>
    <label>
      Options (JSON)<br>
      <textarea name="options" rows="3" cols="80" placeholder='[{"label": "Option 1", "value": "value1"}, {"label": "Option 2", "value": "value2"}]'>{{ .Setting.Options }}</textarea>
      <small>(Required for radio/checkbox/select type, JSON array of {label, value})</small>
    </label>
  </p>

  <p>
    <label>
      Attrs (JSON)<br>
      <textarea name="attrs" rows="3" cols="80" placeholder='{"min": 0, "max": 100, "step": 1}'>{{ .Setting.Attrs }}</textarea>
      <small>(Optional HTML attributes, JSON object)</small>
    </label>
  </p>

  <p>
    <label>
      Default Option Value<br>
      {{ if .Setting.OptionsParsed }}
        <select name="default_option_value">
          <option value="">-- None --</option>
          {{ range .Setting.OptionsParsed }}
            <option value="{{ .value }}" {{ if eq $.Setting.DefaultOptionValue .value }}selected{{ end }}>{{ .label }}</option>
          {{ end }}
        </select>
        <small>(Default value from options above)</small>
      {{ else }}
        <input type="text" name="default_option_value" value="{{ .Setting.DefaultOptionValue }}">
        <small>(Default value for select/radio/checkbox when options are provided)</small>
      {{ end }}
    </label>
  </p>

  <p>
    <label>
      Value<br>
      {{ if eq .Setting.Type "password" }}
        <input type="password" name="value" placeholder="Leave empty to keep current"{{ renderAttrs .Setting.AttrsParsed }}>
      {{ else if eq .Setting.Type "textarea" }}
        <textarea name="value"{{ renderAttrs .Setting.AttrsParsed }}>{{ .Setting.Value }}</textarea>
      {{ else if eq .Setting.Type "select" }}
        {{ if .Setting.OptionsParsed }}
          <select name="value"{{ renderAttrs .Setting.AttrsParsed }}>
            {{ range .Setting.OptionsParsed }}
              <option value="{{ .value }}" {{ if eq $.Setting.Value .value }}selected{{ end }}>{{ .label }}</option>
            {{ end }}
          </select>
        {{ else }}
          <input type="text" name="value" value="{{ .Setting.Value }}"{{ renderAttrs .Setting.AttrsParsed }}>
          <small style="color: orange;">Warning: Options not parsed. Please check Options JSON format.</small>
        {{ end }}
      {{ else if eq .Setting.Type "range" }}
        <input type="range" name="value" value="{{ .Setting.Value }}"{{ renderAttrs .Setting.AttrsParsed }}>
      {{ else }}
        <input type="text" name="value" value="{{ .Setting.Value }}"{{ renderAttrs .Setting.AttrsParsed }}>
      {{ end }}
      <small>(Current value)</small>
    </label>
  </p>

  <p>
    <label>
      Description<br>
      <textarea name="description" rows="2" cols="80">{{ .Setting.Description }}</textarea>
      <small>(Help text shown in admin)</small>
    </label>
  </p>

  <p>
    <label>
      Sort<br>
      <input type="number" name="sort" value="{{ .Setting.Sort }}">
      <small>(Sort order within kind)</small>
    </label>
  </p>

  <p>
    <button type="submit">Save</button>
    <a href="/admin/settings">Back</a>
  </p>

</form>
