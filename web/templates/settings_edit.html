<p>
  <a href="/admin/settings/new">New Setting</a>
</p>

<form method="post" action="/admin/settings">

  {{ range $category, $settings := .SettingsByCategory }}
  <h2>{{ $category }}</h2>

  {{ range $settings }}
  <p>
    <label>
      {{ .Name }}<br>
      {{ if .Description }}
      <small>{{ .Description }}</small><br>
      {{ end }}

      {{ if eq .Type "text" }}
        <input type="text" name="setting_{{ .Code }}" value="{{ .Value }}">
      {{ else if eq .Type "number" }}
        <input type="number" name="setting_{{ .Code }}" value="{{ .Value }}">
      {{ else if eq .Type "date" }}
        <input type="date" name="setting_{{ .Code }}" value="{{ .Value }}">
      {{ else if eq .Type "time" }}
        <input type="time" name="setting_{{ .Code }}" value="{{ .Value }}">
      {{ else if eq .Type "datetime" }}
        <input type="datetime-local" name="setting_{{ .Code }}" value="{{ .Value }}">
      {{ else if eq .Type "url" }}
        <input type="url" name="setting_{{ .Code }}" value="{{ .Value }}">
      {{ else if eq .Type "range" }}
        <input type="range" name="setting_{{ .Code }}" value="{{ .Value }}">
      {{ else if eq .Type "password" }}
        <input type="password" name="setting_{{ .Code }}" placeholder="Leave empty to keep current">
      {{ else if eq .Type "radio" }}
        {{ range .OptionsParsed }}
          <label style="display:inline-block; margin-right:10px;">
            <input type="radio" name="setting_{{ $.Code }}" value="{{ .value }}" {{ if eq $.Value .value }}checked{{ end }}>
            {{ .label }}
          </label>
        {{ end }}
      {{ else if eq .Type "checkbox" }}
        {{ range .OptionsParsed }}
          <label style="display:inline-block; margin-right:10px;">
            <input type="checkbox" name="setting_{{ $.Code }}" value="{{ .value }}" {{ if index $.CheckboxValues .value }}checked{{ end }}>
            {{ .label }}
          </label>
        {{ end }}
      {{ else if eq .Type "select" }}
        <select name="setting_{{ .Code }}">
          {{ range .OptionsParsed }}
            <option value="{{ .value }}" {{ if eq $.Value .value }}selected{{ end }}>{{ .label }}</option>
          {{ end }}
        </select>
      {{ end }}
    </label>
  </p>
  {{ end }}

  <hr>
  {{ end }}

  <p>
    <button type="submit">Save</button>
  </p>

</form>
