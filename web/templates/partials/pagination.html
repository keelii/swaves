<nav aria-label="Page navigation" class="pagination">
  <div class="ivalign gap-1">
    {{if le .Pager.Page 1}}
    <span class="page-link" tabindex="-1">上一页</span>
    {{else}}
    <a class="page-link" href="?page={{add .Pager.Page -1}}&pageSize={{.Pager.PageSize}}{{if .KindQuery}}&kind={{.KindQuery}}{{end}}{{if .SearchQueryEscaped}}&q={{.SearchQueryEscaped}}{{end}}{{if .FilterTagIDStr}}&tag={{.FilterTagIDStr}}{{end}}{{if .FilterCategoryIDStr}}&category={{.FilterCategoryIDStr}}{{end}}" tabindex="-1">上一页</a>
    {{end}}

    {{range $i := until .Pager.Num}}
    {{$pageNum := add $i 1}}
    {{if eq $.Pager.Page $pageNum}}
    <span class="page-link">{{$pageNum}}</span>
    {{else}}
    <a class="page-link" href="?page={{$pageNum}}&pageSize={{$.Pager.PageSize}}{{if $.KindQuery}}&kind={{$.KindQuery}}{{end}}{{if $.SearchQueryEscaped}}&q={{$.SearchQueryEscaped}}{{end}}{{if $.FilterTagIDStr}}&tag={{$.FilterTagIDStr}}{{end}}{{if $.FilterCategoryIDStr}}&category={{$.FilterCategoryIDStr}}{{end}}">{{$pageNum}}</a>
    {{end}}
    {{end}}

    {{if ge .Pager.Page .Pager.Num}}
    <span class="page-link">下一页</span>
    {{else}}
    <a class="page-link" href="?page={{add .Pager.Page 1}}&pageSize={{.Pager.PageSize}}{{if .KindQuery}}&kind={{.KindQuery}}{{end}}{{if .SearchQueryEscaped}}&q={{.SearchQueryEscaped}}{{end}}{{if .FilterTagIDStr}}&tag={{.FilterTagIDStr}}{{end}}{{if .FilterCategoryIDStr}}&category={{.FilterCategoryIDStr}}{{end}}">下一页</a>
    {{end}}
  </div>

  <div class="ivalign gap-h">
    <label for="page-size-select">每页</label>
    <select id="page-size-select" style="padding: 0;min-width:auto">
      <option value="5" {{if eq .Pager.PageSize 5}}selected{{end}}>5</option>
      <option value="10" {{if eq .Pager.PageSize 10}}selected{{end}}>10</option>
      <option value="20" {{if eq .Pager.PageSize 20}}selected{{end}}>20</option>
      <option value="50" {{if eq .Pager.PageSize 50}}selected{{end}}>50</option>
      <option value="100" {{if eq .Pager.PageSize 100}}selected{{end}}>100</option>
    </select>
    <span>条</span>
    <span>，共 {{.Pager.Total}} 条</span>
  </div>
</nav>

<script>
$(function() {
  $('#page-size-select').on('change', function() {
    var url = new URL(window.location.href);
    url.searchParams.set('pageSize', $(this).val());
    url.searchParams.set('page', '1');
    window.location.href = url.toString();
  });
});
</script>
