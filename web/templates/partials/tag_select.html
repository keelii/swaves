<select id="tags-select" name="tags[]" multiple>
  {{ if .Tags }}
    {{ range .Tags }}
      <option value="{{ .ID }}"{{ if $.SelectedTagIDs }}{{ if index $.SelectedTagIDs .ID }} selected{{ end }}{{ end }}>{{ .Name }}</option>
    {{ end }}
  {{ end }}
</select>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const tagsSelect = document.querySelector('#tags-select');
    if (tagsSelect) {
      const choices = new Choices(tagsSelect, {
        placeholderValue: '选择或输入标签',
        placeholder: true,
        removeItemButton: true,
        searchEnabled: true,
        shouldSort: false,
        searchChoices: true,
        addItems: true,
        editItems: false,
        delimiter: ',',
        paste: false,
        duplicateItemsAllowed: false,
      });
    }
  });
</script>
