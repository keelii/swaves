<select id="tags-select" name="tags[]" multiple>
  {{ if .Tags }}
    {{ range .Tags }}
      <option value="{{ .ID }}"{{ if $.SelectedTagIDs }}{{ if index $.SelectedTagIDs .ID }} selected{{ end }}{{ end }}>{{ .Name }}</option>
    {{ end }}
  {{ end }}
</select>
<input type="hidden" name="tags" id="tags-input" />

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const tagsSelect = document.querySelector('#tags-select');
    if (tagsSelect) {
      const choices = new Choices(tagsSelect, {
        placeholderValue: '选择标签    ',
        placeholder: true,
        removeItemButton: true,
        searchEnabled: true,
        shouldSort: false,
        searchChoices: true,
      });

      // 表单提交时处理标签
      document.querySelector('form').addEventListener('submit', function(e) {
        const selectedValues = choices.getValue(true);
        const tagIDs = [];
        const newTagNames = [];

        selectedValues.forEach(value => {
          const strValue = String(value);
          // 如果值是纯数字，说明是现有的标签ID
          // 否则是用户输入的新标签名
          if (/^\d+$/.test(strValue)) {
            tagIDs.push(strValue);
          } else {
            newTagNames.push(strValue);
          }
        });

        // 将标签 ID 和新建标签名称分别存储
        document.getElementById('tags-input').value = tagIDs.join(',');
        if (newTagNames.length > 0) {
          const newTagsInput = document.createElement('input');
          newTagsInput.type = 'hidden';
          newTagsInput.name = 'new_tags';
          newTagsInput.value = newTagNames.join(',');
          this.appendChild(newTagsInput);
        }
      });
    }
  });
</script>
