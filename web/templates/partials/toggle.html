{{ $labels := split .DataLabels "," }}
{{ $onVal := or .DataOnValue "published" }}
{{ $offVal := or .DataOffValue "draft" }}
<span class="toggle-wrapper">
  <input type="checkbox" id="{{ .ID }}"
         class="toggle-checkbox"{{ if .Checked }} checked{{ end }}
         {{ if .ReadOnly }} disabled{{ end }}
         data-on-value="{{ $onVal }}" data-off-value="{{ $offVal }}" />
  <label for="{{ .ID }}" class="toggle-label"></label>
  <span class="toggle-text" data-off="{{ index $labels 0 }}" data-on="{{ index $labels 1 }}"></span>
</span>
{{ if .Name }}
<input type="hidden" name="{{ .Name }}"
       value="{{ if .Checked }}{{ $onVal }}{{ else }}{{ $offVal }}{{ end }}"
       id="{{ .ID }}_hidden" />
{{ end }}
