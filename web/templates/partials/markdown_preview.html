<style>
  .markdown-editor-row.split {
    display: flex;
    /*gap: 10px;*/
    flex-direction: row;
    align-items: stretch;
  }
  .markdown-editor-row .markdown-editor-col {
    min-width: 0;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    width: 50%;
  }
  .markdown-editor-row .markdown-editor-col label {
    margin-bottom: 0.25em;
  }
  .markdown-editor-row .markdown-editor-col textarea {
    flex: 1;
    min-height: 240px;
    resize: vertical;
  }
  .markdown-editor-row .gutter {
    background-repeat: no-repeat;
    background-position: 50%;
    flex-shrink: 0;
    width: 1em;
  }
  .markdown-editor-row .gutter.gutter-horizontal {
    width: 8px;
    cursor: col-resize;
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAeCAYAAADkftS9AAAAIklEQVQoU2M4c+bMfxAGAgYYmwGrIIiDjrELjpo5aiZeMwF+yNnOs5KSvgAAAABJRU5ErkJggg==');
  }
  .markdown-preview {
    flex: 1;
    min-height: 240px;
    padding: 0.75em 1em;
    border: 1px solid var(--nc-bg-3);
    border-radius: 4px;
    background: var(--nc-bg-1);
    overflow: auto;
  }
  .markdown-preview:empty::before {
    content: "预览将在此处显示…";
    color: var(--nc-tx-g-9);
  }
  .markdown-preview li p,
  .markdown-preview p img {
    margin-bottom: 0;
  }

  #toc a {
    color: var(--nc-tx-g-6);
  }
  #split-toc {
    position: sticky;
    top: 0;
  }
  #toc {
    background: var(--nc-bg-2);
    border-radius: 4px;
  }
  #toc #toc-list {
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
  }
  #toc-title {
    display:none;
    padding: 1em;
    font-size: 1.5em;
    margin: 0;
  }
  #toc-list {
    padding: 0.5em 0 0 0;
  }
  #toc-list > li {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  #toc-list > li ul {
    padding-left: 2em;
  }
  #toc-list > li ul ul {
    padding-left: 1.5em;
  }
  #toc-list > li ul {
    list-style-type: decimal;
  }
  #toc-list > li ul ul {
    list-style-type: lower-alpha;
  }
  #toc-list > li ul ul ul {
    list-style-type: lower-roman;
  }
  #toc-list > li ul ul ul {
    list-style-type: lower-greek;
  }
</style>
<div class="markdown-editor-col" id="split-preview">
  <label>Preview</label>
  <div id="content-preview" class="markdown-preview"></div>
</div>
<div id="split-toc-wrap" class="markdown-editor-col">
  <label for="">Table of Contents</label>
  <div id="split-toc"></div>
</div>
<script src="/static/split.min.js"></script>
<script>
$(function() {
  var $ta = $('textarea[name="content"]'), $preview = $('#content-preview');
  if ($ta.length && $preview.length) {
    var timer;
    function update() {
      var text = $ta.val() || '';
      if (!text.trim()) {
        $preview.empty();
        return;
      }
      fetch('/api/markdown', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: text }) })
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res && res.data != null) {
            $preview.html(res.data);
            updateToc()
          }
        })
        .catch(function() { $preview.text('预览请求失败'); });
    }
    $ta.on('input paste', function() {
      clearTimeout(timer);
      timer = setTimeout(update, 280);
    });
    update();
  }
  function updateToc() {
    $("#toc").appendTo($("#split-toc"))
  }
  if ($('#split-editor').length && $('#split-preview').length && typeof Split !== 'undefined') {
    updateToc()
    Split(
      ['#split-editor', '#split-preview', '#split-toc-wrap'],
      {
        sizes: [40, 40, 20],
        minSize: [180, 180],
        gutterSize: 8,
        direction: 'horizontal'
      }
    );
  }
});
</script>
