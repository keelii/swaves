<style>
  .markdown-editor-row.split {
    display: flex;
    /*gap: 10px;*/
    flex-direction: row;
    align-items: stretch;
  }
  .markdown-editor-row .markdown-editor-col {
    min-width: 0;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    width: 50%;
  }
  .markdown-editor-row .markdown-editor-col label {
    margin-bottom: 0.25em;
  }
  .markdown-editor-row .markdown-editor-col textarea {
    flex: 1;
    min-height: 240px;
    resize: vertical;
  }
  .markdown-editor-row .gutter {
    background-repeat: no-repeat;
    background-position: 50%;
    flex-shrink: 0;
    width: 1em;
  }
  .markdown-editor-row .gutter.gutter-horizontal {
    width: 8px;
    cursor: col-resize;
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAeCAYAAADkftS9AAAAIklEQVQoU2M4c+bMfxAGAgYYmwGrIIiDjrELjpo5aiZeMwF+yNnOs5KSvgAAAABJRU5ErkJggg==');
  }
  .markdown-preview {
    flex: 1;
    min-height: 240px;
    padding: 0.75em 1em;
    border: 1px solid var(--nc-bg-3);
    border-radius: 4px;
    background: var(--nc-bg-1);
    overflow: auto;
  }
  .markdown-preview:empty::before {
    content: "预览将在此处显示…";
    color: var(--nc-tx-g-9);
  }
  .markdown-preview li p,
  .markdown-preview p img {
    margin-bottom: 0;
  }
</style>
<div class="markdown-editor-col" id="split-preview">
  <label>Preview</label>
  <div id="content-preview" class="markdown-preview"></div>
</div>
<script src="/static/split.min.js"></script>
<script>
  (function() {
    function initMarkdownPreview() {
      var ta = document.querySelector('textarea[name="content"]');
      var preview = document.getElementById('content-preview');
      if (!ta || !preview) return;
      var timer = null;
      function update() {
        var text = ta.value || '';
        if (!text.trim()) {
          preview.innerHTML = '';
          return;
        }
        fetch('/api/markdown', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: text })
        }).then(function(r) { return r.json(); }).then(function(res) {
          if (res && res.data != null) preview.innerHTML = res.data;
        }).catch(function() {
          preview.textContent = '预览请求失败';
        });
      }
      function schedule() {
        if (timer) clearTimeout(timer);
        timer = setTimeout(update, 280);
      }
      ta.addEventListener('input', schedule);
      ta.addEventListener('paste', schedule);
      update();
    }
    function init() {
      var a = document.getElementById('split-editor');
      var b = document.getElementById('split-preview');
      if (a && b && typeof Split !== 'undefined') {
        Split(['#split-editor', '#split-preview'], {
          sizes: [50, 50],
          minSize: [180, 180],
          gutterSize: 8,
          direction: 'horizontal'
        });
      }
      initMarkdownPreview();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
