{{ $placeholder := or .Placeholder "文章内容（支持 Markdown）" }}
{{ $value := or .Value "" }}
{{ $required := or .Required false }}
<style>
  /* markdown 编辑/预览：tab 内容区可见，预览模式内用 split 分预览与 TOC */
  .markdown-editor-wrap .tab-card .tab-content {
    height: auto;
    min-height: 280px;
    overflow: visible;
    /*border-top: 1px solid var(--border);*/
    /*border-radius: 0 4px 4px 4px;*/
  }
  .markdown-editor-wrap .tab-pane {
    display: none;
  }
  .markdown-editor-wrap .tab-pane.active {
    display: block;
  }
  .markdown-editor-wrap .tab-pane textarea {
    width: 100%;
    min-height: 240px;
    resize: vertical;
  }
  .markdown-preview-row {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    min-height: 240px;
  }
  .markdown-preview-row .markdown-editor-col {
    min-width: 0;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }
  .markdown-preview-row .markdown-editor-col label {
    margin-bottom: 0.25em;
  }
  .markdown-preview-row .gutter.gutter-horizontal {
    width: 8px;
    flex-shrink: 0;
    cursor: col-resize;
    background-repeat: no-repeat;
    background-position: 50%;
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAeCAYAAADkftS9AAAAIklEQVQoU2M4c+bMfxAGAgYYmwGrIIiDjrELjpo5aiZeMwF+yNnOs5KSvgAAAABJRU5ErkJggg==');
  }
  .markdown-preview-box {
    flex: 1;
    min-height: 200px;
    padding: 0.75em 1em;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--card);
    overflow: auto;
  }
  .markdown-preview-box:empty::before {
    content: "预览将在此处显示…";
    color: var(--muted-foreground);
  }
  .markdown-editor-wrap .split-toc-wrap {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /*.toc {*/
  /*  max-height: calc(100vh - 50px);*/
  /*}*/
  /*.toc a, .toc li {*/
  /*  font-size: 16px;*/
  /*}*/
  /*.toc ol {*/
  /*  padding-left: 1em;*/
  /*}*/
  .toc ol { list-style-type: decimal }
  .toc ol ol { list-style-type: lower-alpha }
  .toc ol ol ol { list-style-type: lower-roman }
  .toc ol ol ol ol { list-style-type: lower-greek }
  .toc ol ol ol ol ol { list-style-type: decimal }
  .toc ol ol ol ol ol ol { list-style-type: lower-alpha }
  .toc-toggle {
    display: none;
  }
  .toc-title {
    position: sticky;
    padding: 0 1em;
    margin: 0;
    height: 40px;
    line-height: 40px;
    font-size: 18px;
    font-style: normal;
    font-weight: bold;
    border-bottom: 1px solid #eee;
  }
  .toc .toc-list {
    overflow-y: auto;
    margin: 0;
    padding: 0.5em 0.5em 0.5em 1.5em;
    /*height: calc(100% - 40px);*/
    box-sizing: border-box;
  }
  .toc-list::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }

  .toc-list::-webkit-scrollbar-track {
    background: transparent;
  }

  .toc-list::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.15);
    border-radius: 999px;
    transition: background 0.2s ease;
  }

  .toc-list::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 0, 0, 0.3);
  }
</style>
<div class="markdown-editor-wrap">
  <div class="tab-card simple">
    <div class="tab-nav">
      <div class="tab-item active" data-tab="edit">编辑</div>
      <div class="tab-item" data-tab="preview">预览</div>
    </div>
    <div class="tab-content">
      <div class="tab-pane active" id="pane-edit">
        <textarea name="content" id="content" rows="40" cols="80" placeholder="{{ $placeholder }}"{{ if $required }} required{{ end }}>{{ $value }}</textarea>
      </div>
      <div class="tab-pane" id="pane-preview">
        <div class="markdown-preview-row split" id="preview-split-row">
          <div class="markdown-editor-col" id="split-preview">
            <div id="content-preview" class="markdown-preview-box"></div>
          </div>
          <div class="markdown-editor-col split-toc-wrap" id="split-toc-wrap">
            <div id="split-toc"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/static/split.min.js"></script>
<script>
$(function() {
  var $ta = $('textarea[name="content"]');
  var $preview = $('#content-preview');
  var $navItems = $('.markdown-editor-wrap .tab-item');
  var $panes = $('.markdown-editor-wrap .tab-pane');
  var splitInstance = null;

  function showPane(tab) {
    $navItems.removeClass('active').filter('[data-tab="' + tab + '"]').addClass('active');
    $panes.removeClass('active').filter('#pane-' + tab).addClass('active');
    if (tab === 'preview') {
      update();
      if (typeof Split !== 'undefined' && !splitInstance && $('#preview-split-row').length) {
        splitInstance = Split(['#split-preview', '#split-toc-wrap'], {
          sizes: [70, 30],
          minSize: [120, 0],
          gutterSize: 8,
          direction: 'horizontal'
        });
      }
    }
  }

  $navItems.on('click', function() {
    var tab = $(this).data('tab');
    showPane(tab);
  });

  function update() {
    var text = $ta.val() || '';
    if (!text.trim()) {
      $preview.empty();
      $('#split-toc').empty();
      return;
    }
    fetch('/api/markdown', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text })
    })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res && res.data != null) {
          $preview.html(res.data);
          $('.toc').appendTo($('#split-toc').empty());
          if (typeof MathJax !== 'undefined') {
            // console.log(MathJax.typesetPromise)
            MathJax.typesetPromise([$preview[0]])
          }
        }
      })
      .catch(function() { $preview.text('预览请求失败'); });
  }

  if ($ta.length && $preview.length) {
    var timer;
    $ta.on('input paste', function() {
      clearTimeout(timer);
      timer = setTimeout(update, 280);
    });
  }
});
</script>
<script>
  window.MathJax = {
    options: {},
    startup: {
      typeset: false   // 关键：禁止自动扫描
    },
    tex: {
      inlineMath: [ ['$','$'] ],
      displayMath: [ ['$$','$$'] ],
      processEscapes: false
    }
  }
</script>
<script id="MathJax-script" src="/static/MathJax/tex-chtml.js" async></script>
