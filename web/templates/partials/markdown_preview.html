{{ $placeholder := or .Placeholder "文章内容（支持 Markdown）" }}
{{ $value := or .Value "" }}
{{ $required := or .Required false }}
<style>
  /* markdown 编辑/预览：tab 内容区可见，预览模式内用 split 分预览与 TOC */
  .markdown-editor-wrap .tab-card .tab-content {
    height: auto;
    min-height: 280px;
    overflow: visible;
    /*border-top: 1px solid var(--nc-bg-3);*/
    /*border-radius: 0 4px 4px 4px;*/
  }
  .markdown-editor-wrap .tab-pane {
    display: none;
  }
  .markdown-editor-wrap .tab-pane.active {
    display: block;
  }
  .markdown-editor-wrap .tab-pane textarea {
    width: 100%;
    min-height: 240px;
    resize: vertical;
  }
  .markdown-preview-row {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    min-height: 240px;
  }
  .markdown-preview-row .markdown-editor-col {
    min-width: 0;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }
  .markdown-preview-row .markdown-editor-col label {
    margin-bottom: 0.25em;
  }
  .markdown-preview-row .gutter.gutter-horizontal {
    width: 8px;
    flex-shrink: 0;
    cursor: col-resize;
    background-repeat: no-repeat;
    background-position: 50%;
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAeCAYAAADkftS9AAAAIklEQVQoU2M4c+bMfxAGAgYYmwGrIIiDjrELjpo5aiZeMwF+yNnOs5KSvgAAAABJRU5ErkJggg==');
  }
  .markdown-preview-box {
    flex: 1;
    min-height: 200px;
    padding: 0.75em 1em;
    border: 1px solid var(--nc-bg-3);
    border-radius: 4px;
    background: var(--nc-bg-1);
    overflow: auto;
  }
  .markdown-preview-box:empty::before {
    content: "预览将在此处显示…";
    color: var(--nc-tx-g-9);
  }
  .markdown-preview-box li p,
  .markdown-preview-box p img {
    margin-bottom: 0;
  }
  .markdown-editor-wrap #toc a {
    color: var(--nc-tx-g-6);
  }
  .markdown-editor-wrap .split-toc-wrap {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .markdown-editor-wrap #toc {
    background: var(--nc-bg-2);
    border-radius: 4px;
    flex: 1;
    overflow: auto;
  }
  .markdown-editor-wrap #toc-title {
    /*display: none;*/
    padding: 1em;
    font-size: 1.2em;
    margin: 0;
    border-bottom: 1px solid var(--nc-bg-3);
  }
  .markdown-editor-wrap #toc-list {
    padding: 0.5em 0 0 0;
  }
  .markdown-editor-wrap #toc-list > li {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .markdown-editor-wrap #toc-list > li ul {
    padding-left: 2em;
    list-style-type: decimal;
  }
  .markdown-editor-wrap #toc-list > li ul ul {
    padding-left: 1.5em;
    list-style-type: lower-alpha;
  }
  .markdown-editor-wrap #toc-list > li ul ul ul {
    list-style-type: lower-roman;
  }
  .markdown-editor-wrap #toc-list > li ul ul ul {
    list-style-type: lower-greek;
  }
  #split-toc {
    position: sticky;
    top: 0;
  }
</style>
<div class="markdown-editor-wrap">
  <div class="tab-card simple">
    <div class="tab-nav">
      <div class="tab-item active" data-tab="edit">编辑</div>
      <div class="tab-item" data-tab="preview">预览</div>
    </div>
    <div class="tab-content">
      <div class="tab-pane active" id="pane-edit">
        <textarea name="content" id="content" rows="40" cols="80" placeholder="{{ $placeholder }}"{{ if $required }} required{{ end }}>{{ $value }}</textarea>
      </div>
      <div class="tab-pane" id="pane-preview">
        <div class="markdown-preview-row split" id="preview-split-row">
          <div class="markdown-editor-col" id="split-preview">
            <div id="content-preview" class="markdown-preview-box"></div>
          </div>
          <div class="markdown-editor-col split-toc-wrap" id="split-toc-wrap">
            <div id="split-toc"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/static/split.min.js"></script>
<script>
$(function() {
  var $ta = $('textarea[name="content"]'), $preview = $('#content-preview');
  var $navItems = $('.markdown-editor-wrap .tab-item'), $panes = $('.markdown-editor-wrap .tab-pane');
  var splitInstance = null;

  function showPane(tab) {
    $navItems.removeClass('active').filter('[data-tab="' + tab + '"]').addClass('active');
    $panes.removeClass('active').filter('#pane-' + tab).addClass('active');
    if (tab === 'preview') {
      update();
      if (typeof Split !== 'undefined' && !splitInstance && $('#preview-split-row').length) {
        splitInstance = Split(['#split-preview', '#split-toc-wrap'], {
          sizes: [70, 30],
          minSize: [120, 0],
          gutterSize: 8,
          direction: 'horizontal'
        });
      }
    }
  }

  $navItems.on('click', function() {
    var tab = $(this).data('tab');
    showPane(tab);
  });

  function update() {
    var text = $ta.val() || '';
    if (!text.trim()) {
      $preview.empty();
      $('#split-toc').empty();
      return;
    }
    fetch('/api/markdown', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: text }) })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res && res.data != null) {
          $preview.html(res.data);
          $('#toc').appendTo($('#split-toc'));
        }
      })
      .catch(function() { $preview.text('预览请求失败'); });
  }

  if ($ta.length && $preview.length) {
    var timer;
    $ta.on('input paste', function() {
      clearTimeout(timer);
      timer = setTimeout(update, 280);
    });
  }
});
</script>
