<h1>New Tag</h1>

<form method="post" action="/admin/tags/new">

  <p>
    <label>
      Name<br>
      <input type="text" name="name" required>
    </label>
  </p>

  <p>
    <label>
      Slug<br>
      <input type="text" name="slug" required>
    </label>
  </p>

  <p>
    <button type="submit">Create</button>
    <a href="/admin/tags">Cancel</a>
  </p>

</form>
