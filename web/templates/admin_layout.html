<!doctype html>
<html lang="{{ settings "language" }}">
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} - {{ settings "site_name" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- https://github.com/edwardtufte/tufte-css -->
  <link rel="stylesheet" href="/static/oat/oat.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/jquery-4.0.0.slim.min.js"></script>
  <style>
      :root {
        --admin-font-size: {{ settings "font_size"}}px;
        /*--font-sans: -apple-system, system-ui, sans-serif;*/
        /*--font-sans: Inter, -apple-system, "system-ui", "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";*/
      }
      .content-body {
          font-size: var(--admin-font-size);
      }
      .inline-flex {
          display: inline-flex;
      }
      .grow {
          flex-grow: 1;
      }
      .row-actions {
          display: inline-flex;
          align-items: center;
          gap: 8px;
      }
      .row-actions form {
          margin: 0;
      }
      .row-actions .row-action-btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          width: 28px;
          height: 28px;
          padding: 0;
          margin: 0;
          color: var(--foreground);
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: var(--radius-medium);
          cursor: pointer;
          text-decoration: none;
      }
      .row-action-btn:hover {
          background: var(--card);
          color: var(--primary);
          border-color: var(--primary);
      }
  </style>
</head>
<body{{ if eq (settings "mode") "dark" }} data-theme="dark"{{ end }}>

<div class="admin-container">
  <!-- 顶部导航 -->
  <div class="top-navigation flex justify-between">
    <div class="nav-brand">
      <span class="menu-toggle-btn" onclick="toggleSidebar()">☰</span>
      {{ settings "site_name" }} Admin
    </div>
    <div class="nav-actions flex justify-between grow">
      {{template "partials/actions" .}}
      <div class="nav-user">
          {{ if .IsLogin }}
            <span>欢迎，{{ settings "author" }}</span> <a href="/admin/logout">退出</a>
          {{ else }}
            <span>请先</span> <a href="/admin/login">登录</a>
          {{ end }}
        <div class="user-avatar">
            <img width="32" height="32" src="{{ settings "author_avatar" }}" alt="{{ settings "author" }}">
        </div>
      </div>
    </div>
  </div>

  <!-- 主体区域 -->
  <div class="main-wrapper">
    <!-- 左侧菜单 -->
    <div class="sidebar-menu" id="sidebar">
      {{template "partials/menu" .}}
    </div>

    <!-- 主内容区域 -->
    <div class="content-area">
      <div class="content-header content-box" style="display:none;">
        <div class="content-title">
          {{template "partials/actions" .}}
        </div>
      </div>
      <div class="content-body content-box">
        {{ template "partials/error_message" . }}
        {{embed}}
      </div>
    </div>
  </div>
</div>

<script>
    function toggleSidebar() {
        var $sidebar = $('#sidebar');
        if (window.innerWidth <= 768) {
            $sidebar.toggleClass('mobile-expanded');
        } else {
            $sidebar.toggleClass('collapsed');
        }
        if ($sidebar.hasClass('collapsed') || !$sidebar.hasClass('mobile-expanded')) {
            $('.menu-item.expanded').removeClass('expanded');
            $('.submenu-list.show').removeClass('show');
        }
    }

    function toggleSubmenu(element) {
        var $sidebar = $('#sidebar');
        var isMobile = window.innerWidth <= 768;
        if ((isMobile && !$sidebar.hasClass('mobile-expanded')) || (!isMobile && $sidebar.hasClass('collapsed'))) return;
        var $el = $(element);
        var $sub = $el.siblings('.submenu-list');
        if ($el.hasClass('expanded')) {
            $el.removeClass('expanded');
            $sub.removeClass('show');
        } else {
            $el.addClass('expanded');
            $sub.addClass('show');
        }
    }

    $(function() {
        $(document).on('change', '.toggle-checkbox', function() {
            var $h = $('#' + this.id + '_hidden');
            if ($h.length) {
                var onVal = $(this).data('onValue'), offVal = $(this).data('offValue');
                $h.val(onVal !== undefined && offVal !== undefined ? (this.checked ? onVal : offVal) : (this.checked ? 'published' : 'draft'));
            }
        });
        $('.menu-item').each(function() {
            if (!$(this).parent().find('.submenu-list').length) {
                $(this).on('click', function() {
                    $('.menu-item, .submenu-item').removeClass('active');
                    $(this).addClass('active');
                });
            }
        });
        $('.submenu-item').on('click', function(e) {
            e.stopPropagation();
            $('.menu-item, .submenu-item').removeClass('active');
            $(this).addClass('active');
        });
        $(window).on('resize', function() {
            if (window.innerWidth > 768) $('#sidebar').removeClass('mobile-expanded');
            else $('#sidebar').removeClass('collapsed');
        });
    });
</script>

</body>
</html>
