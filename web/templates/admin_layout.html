<!doctype html>
<html lang="{{ settings "language" }}">
<head>
  <meta charset="utf-8">
  <title>{{ .Title }} - {{ settings "site_name" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <!-- https://github.com/edwardtufte/tufte-css -->
  <link rel="stylesheet" href="/static/new.css" />
  <link rel="stylesheet" href="/static/style.css" />
  {{ if eq (settings "mode") "dark"}}
  <style>
      :root {
          --nc-tx-1: #ffffff;
          --nc-tx-2: #eeeeee;
          --nc-bg-1: #000000;
          --nc-bg-2: #111111;
          --nc-bg-3: #222222;
          --nc-lk-1: #3291FF;
          --nc-lk-2: #0070F3;
          --nc-lk-tx: #FFFFFF;
          --nc-ac-1: #7928CA;
          --nc-ac-tx: #FFFFFF;
      }
  </style>
  {{ else }}
    <style>
        :root {
            --nc-tx-2: #433;
            --nc-bg-2: #f5f6f7;
            --ui-font-size: {{ settings "font_size"}}px;
        }
    </style>
  {{ end }}
  <style>
      body {
          /*-max-width: var(--admin_main_width);*/
          /*font-size: var(--ui-font-size);*/
      }
      .content-body {
          font-size: var(--ui-font-size);
      }
      svg {
          vertical-align: text-bottom;
      }
      nav, form, button {
          margin-bottom: 0;
      }
      table th {
          white-space: nowrap;
      }
      textarea, select, input {
          margin-bottom: 0;
      }
      .text-overflow {
          width: 5em;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
      }
      .gap-5 {
          gap: 5px;
      }
      .gap-10 {
          gap: 10px;
      }
      .inline-flex {
          display: inline-flex;
      }
      .valign {
          display: flex;
          align-items: center;
          /*gap: 5px;*/
      }
      .ivalign {
          display: inline-flex;
          align-items: center;
          /*gap: 5px;*/
      }
      .grow {
          flex-grow: 1;
      }
      .salign {
          display:flex;
          justify-content: space-between;
      }
      .ellipsis {
          width: 10em;
          display: inline-block;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
      }
      .long-text {
          overflow: hidden;
          background: transparent;
      }
      .long-text:hover {
      }
  </style>
</head>
<body>

<div class="admin-container">
  <!-- 顶部导航 -->
  <div class="top-navigation salign">
    <div class="nav-brand">
      <span class="menu-toggle-btn" onclick="toggleSidebar()">☰</span>
      Swaves Admin
    </div>
    <div class="nav-actions salign grow">
      {{template "partials/actions" .}}
      <div class="nav-user">
          {{ if .IsLogin }}
            <span>欢迎，管理员</span> <a href="/admin/logout">退出</a>
          {{ else }}
            <span>请先</span> <a href="/admin/login">登录</a>
          {{ end }}
        <div class="user-avatar">A</div>
      </div>
    </div>
  </div>

  <!-- 主体区域 -->
  <div class="main-wrapper">
    <!-- 左侧菜单 -->
    <div class="sidebar-menu" id="sidebar">
      {{template "partials/menu" .}}
    </div>

    <!-- 主内容区域 -->
    <div class="content-area">
      <div class="content-header content-box" style="display:none;">
        <div class="content-title">
          {{template "partials/actions" .}}
        </div>
      </div>
      <div class="content-body content-box">
        {{embed}}
      </div>
    </div>
  </div>
</div>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');

        // 小屏幕特殊处理
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('mobile-expanded');
        } else {
            sidebar.classList.toggle('collapsed');
        }

        // 收起时关闭所有子菜单
        if (sidebar.classList.contains('collapsed') || !sidebar.classList.contains('mobile-expanded')) {
            document.querySelectorAll('.menu-item.expanded').forEach(item => {
                item.classList.remove('expanded');
            });
            document.querySelectorAll('.submenu-list.show').forEach(submenu => {
                submenu.classList.remove('show');
            });
        }
    }

    function toggleSubmenu(element) {
        // 获取侧边栏状态
        const sidebar = document.getElementById('sidebar');
        const isMobile = window.innerWidth <= 768;

        // 小屏未展开或大屏收起状态不展开子菜单
        if ((isMobile && !sidebar.classList.contains('mobile-expanded')) ||
            (!isMobile && sidebar.classList.contains('collapsed'))) {
            return;
        }

        const parent = element.parentElement;
        const submenu = parent.querySelector('.submenu-list');
        const isExpanded = element.classList.contains('expanded');

        // 只切换当前子菜单，不影响其他菜单
        if (isExpanded) {
            element.classList.remove('expanded');
            submenu.classList.remove('show');
        } else {
            element.classList.add('expanded');
            submenu.classList.add('show');
        }
    }

    // 一级菜单项点击事件
    document.querySelectorAll('.menu-item').forEach(item => {
        // 排除有子菜单的项
        if (!item.parentElement.querySelector('.submenu-list')) {
            item.addEventListener('click', function() {
                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                document.querySelectorAll('.submenu-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        }
    });

    // 二级菜单项点击事件
    document.querySelectorAll('.submenu-item').forEach(item => {
        item.addEventListener('click', function(e) {
            e.stopPropagation();
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.submenu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
        });
    });

    // 响应窗口大小变化
    window.addEventListener('resize', function() {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth > 768) {
            sidebar.classList.remove('mobile-expanded');
        } else {
            // 小屏时确保默认收起
            sidebar.classList.remove('collapsed');
        }
    });
</script>

</body>
</html>
