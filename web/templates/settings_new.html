{{ if .Error }}
<p style="color: red;">Error: {{ .Error }}</p>
{{ end }}

<form method="post" action="/admin/settings/new">

  <p>
    <label>
      Category<br>
      <input type="text" name="category" value="{{ if .Setting }}{{ .Setting.Category }}{{ else }}default{{ end }}" required>
      <small>(e.g., system, url, integration, default)</small>
    </label>
  </p>

  <p>
    <label>
      Name<br>
      <input type="text" name="name" value="{{ if .Setting }}{{ .Setting.Name }}{{ end }}" required>
      <small>(Human readable name)</small>
    </label>
  </p>

  <p>
    <label>
      Code<br>
      <input type="text" name="code" value="{{ if .Setting }}{{ .Setting.Code }}{{ end }}" required>
      <small>(Unique key, e.g., site_name, admin_password)</small>
    </label>
  </p>

  <p>
    <label>
      Type<br>
      <select name="type" required>
        <option value="text" {{ if and .Setting (eq .Setting.Type "text") }}selected{{ end }}>text</option>
        <option value="number" {{ if and .Setting (eq .Setting.Type "number") }}selected{{ end }}>number</option>
        <option value="date" {{ if and .Setting (eq .Setting.Type "date") }}selected{{ end }}>date</option>
        <option value="time" {{ if and .Setting (eq .Setting.Type "time") }}selected{{ end }}>time</option>
        <option value="datetime" {{ if and .Setting (eq .Setting.Type "datetime") }}selected{{ end }}>datetime</option>
        <option value="url" {{ if and .Setting (eq .Setting.Type "url") }}selected{{ end }}>url</option>
        <option value="range" {{ if and .Setting (eq .Setting.Type "range") }}selected{{ end }}>range</option>
        <option value="password" {{ if and .Setting (eq .Setting.Type "password") }}selected{{ end }}>password</option>
        <option value="radio" {{ if and .Setting (eq .Setting.Type "radio") }}selected{{ end }}>radio</option>
        <option value="checkbox" {{ if and .Setting (eq .Setting.Type "checkbox") }}selected{{ end }}>checkbox</option>
        <option value="select" {{ if and .Setting (eq .Setting.Type "select") }}selected{{ end }}>select</option>
      </select>
    </label>
  </p>

  <p>
    <label>
      Options (JSON)<br>
      <textarea name="options" rows="5" cols="80" placeholder='[{"label": "Option 1", "value": "value1"}, {"label": "Option 2", "value": "value2"}]'>{{ if .Setting }}{{ .Setting.Options }}{{ end }}</textarea>
      <small>(Required for radio/checkbox/select type, JSON array of {label, value})</small>
    </label>
  </p>

  <p>
    <label>
      Attrs (JSON)<br>
      <textarea name="attrs" rows="3" cols="80" placeholder='{"min": 0, "max": 100, "step": 1}'>{{ if .Setting }}{{ .Setting.Attrs }}{{ end }}</textarea>
      <small>(Optional HTML attributes, JSON object)</small>
    </label>
  </p>

  <p>
    <label>
      Value<br>
      <input type="text" name="value" value="{{ if .Setting }}{{ .Setting.Value }}{{ end }}">
      <small>(Default value)</small>
    </label>
  </p>

  <p>
    <label>
      Description<br>
      <textarea name="description" rows="2" cols="80">{{ if .Setting }}{{ .Setting.Description }}{{ end }}</textarea>
      <small>(Help text shown in admin)</small>
    </label>
  </p>

  <p>
    <label>
      Sort<br>
      <input type="number" name="sort" value="{{ if .Setting }}{{ .Setting.Sort }}{{ else }}0{{ end }}">
      <small>(Sort order within category)</small>
    </label>
  </p>

  <p>
    <button type="submit">Create</button>
    <a href="/admin/settings">Cancel</a>
  </p>

</form>
