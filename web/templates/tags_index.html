<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>名称</th>
    <th>别名</th>
    <th>文章数量</th>
    <th>创建时间</th>
    <th>更新时间</th>
    <th>操作</th>
  </tr>
  </thead>

  <tbody>
  {{ range .Tags }}
  <tr>
    <td>{{ .ID }}</td>
    <td>{{ .Name }}</td>
    <td>{{ .Slug }}</td>
    <td>{{ $count := index $.PostCounts .ID }}{{ if $count }}{{ $count }}{{ else }}0{{ end }}</td>
    <td>{{ formatTime .CreatedAt }}</td>
    <td>{{ formatTime .UpdatedAt }}</td>
    <td>
      <a href="/admin/tags/{{ .ID }}/edit">Edit</a>

      <form id="form" method="post" style="display:inline" action="/admin/tags/{{ .ID }}/delete">
        <button type="submit">Delete</button>
      </form>
    </td>
  </tr>
  {{ else }}
  <tr>
    <td colspan="7">No tags</td>
  </tr>
  {{ end }}
  </tbody>

  <tfoot>
  <tr>
    <td colspan="7">
      {{template "partials/pagination" .}}
    </td>
  </tr>
  </tfoot>
</table>
